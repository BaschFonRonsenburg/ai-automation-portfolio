, pulls fresh part-time AI-automation jobs from three boards, de-dupes and summarizes them, and emails a designed report.","tech":["n8n","Google Gemini","Remotive","Jobicy","JSearch","Gmail"],"trigger":"Scheduled · Mon & Thu 08:00","nodes":[{"id":"node-schedule","name":"Schedule (Mon & Thu 08:00)","type":"n8n-nodes-base.scheduleTrigger","typeVersion":1.2,"position":[0,320],"parameters":{"rule":{"interval":[{"field":"weeks","weeksInterval":1,"triggerAtDay":[1,4],"triggerAtHour":8,"triggerAtMinute":0}]}}},{"id":"node-config","name":"Config","type":"n8n-nodes-base.set","typeVersion":3.4,"position":[220,320],"parameters":{"assignments":{"assignments":[{"id":"a1","name":"searchTerm","value":"automation","type":"string"},{"id":"a2","name":"maxAgeDays","value":30,"type":"number"},{"id":"a3","name":"allowedTypes","value":"part_time,contract,freelance","type":"string"},{"id":"a4","name":"requireKeyword","value":true,"type":"boolean"},{"id":"a5","name":"recipient","value":"you@example.com","type":"string"}]},"options":{}}},{"id":"node-remotive","name":"Remotive","type":"n8n-nodes-base.httpRequest","typeVersion":4.2,"position":[440,200],"parameters":{"url":"https://remotive.com/api/remote-jobs","sendQuery":true,"queryParameters":{"parameters":[{"name":"search","value":"={{ $json.searchTerm }}"},{"name":"limit","value":"50"}]},"options":{"timeout":20000}},"onError":"continueRegularOutput","retryOnFail":true,"maxTries":3,"waitBetweenTries":2000},{"id":"node-jobicy","name":"Jobicy","type":"n8n-nodes-base.httpRequest","typeVersion":4.2,"position":[440,440],"parameters":{"url":"https://jobicy.com/api/v2/remote-jobs","sendQuery":true,"queryParameters":{"parameters":[{"name":"count","value":"50"},{"name":"tag","value":"={{ $json.searchTerm }}"}]},"options":{"timeout":20000}},"onError":"continueRegularOutput","retryOnFail":true,"maxTries":3,"waitBetweenTries":2000},{"id":"node-jsearch","name":"JSearch","type":"n8n-nodes-base.httpRequest","typeVersion":4.2,"position":[440,620],"parameters":{"method":"GET","url":"https://jsearch.p.rapidapi.com/search-v2","authentication":"genericCredentialType","genericAuthType":"httpHeaderAuth","sendHeaders":true,"headerParameters":{"parameters":[{"name":"X-RapidAPI-Host","value":"jsearch.p.rapidapi.com"}]},"sendQuery":true,"queryParameters":{"parameters":[{"name":"query","value":"={{ $json.searchTerm }}"},{"name":"page","value":"1"},{"name":"num_pages","value":"2"},{"name":"employment_types","value":"PARTTIME,CONTRACTOR"},{"name":"remote_jobs_only","value":"true"},{"name":"date_posted","value":"month"}]},"options":{"timeout":20000}},"onError":"continueRegularOutput","retryOnFail":true,"maxTries":3,"waitBetweenTries":2000},{"id":"node-merge","name":"Merge Sources","type":"n8n-nodes-base.merge","typeVersion":3.2,"position":[640,460],"parameters":{"mode":"append","numberInputs":3}},{"id":"node-compile","name":"Compile Jobs","type":"n8n-nodes-base.code","typeVersion":2,"position":[680,320],"parameters":{"mode":"runOnceForAllItems","jsCode":"/**\n * normalize-jobs.js — body of the n8n Code node \"Compile Jobs\".\n * Mode: \"Run Once for All Items\".\n *\n * n8n Code nodes cannot require() local files, so the pure transform below is\n * INLINED from src/normalize-core.js — keep the two in sync. The only n8n-specific\n * parts are the input readers (readApiArray / readConfig) and the return shape at\n * the bottom.\n *\n * Reads the upstream nodes: \"Config\" (Set), \"Remotive\" (HTTP), \"Jobicy\" (HTTP),\n * \"JSearch\" (HTTP). Returns one n8n item per matched job (now carrying a cleaned\n * `description`, an empty `summary` for the LLM node to fill, and a `trust_score`),\n * or a single { empty: true } item when nothing matched (so the \"no results\" email\n * branch still fires — a node that outputs zero items would stop the workflow).\n */\n\n// ===== BEGIN inlined core (mirror of src/normalize-core.js) =================\nconst DEFAULT_CONFIG = {\n  allowedTypes: ['part_time', 'contract', 'freelance'],\n  maxAgeDays: 30,\n  requireKeyword: true,\n  keywords: [\n    'automation', 'automate', 'rpa', 'zapier', 'n8n', 'make.com', 'workflow',\n    'integration', 'no-code', 'low-code', 'ai agent', 'artificial intelligence',\n    'machine learning', 'data annotation', 'data label',\n    'process automation', 'workflow automation', 'ai automation', 'agentic',\n    'chatbot', 'power automate', 'uipath',\n  ],\n  excludeTitleKeywords: [\n    'sales', 'account executive', 'account manager', 'business development',\n    'recruit', 'copywriter', 'content writer', 'sdr', 'bdr',\n  ],\n  // HARD block: clerical roles that sometimes carry \"automation\" in the title but are never\n  // AI-automation roles. Dropped even when the title mentions a keyword.\n  blockTitleKeywords: [\n    'secretary', 'receptionist', 'data entry', 'administrative assistant', 'office administrator',\n    'virtual assistant', 'appointment setter', 'telemarketer', 'call center', 'cold caller',\n    'customer service representative',\n  ],\n};\n\nconst REPUTABLE_BOARDS = [\n  'linkedin', 'indeed', 'glassdoor', 'ziprecruiter', 'wellfound', 'we work remotely',\n  'remotive', 'jobicy', 'dice', 'builtin', 'stack overflow', 'weworkremotely', 'greenhouse',\n  'lever', 'workday',\n];\n\nfunction normJobType(raw) {\n  if (!raw) return '';\n  return String(raw).toLowerCase().trim().replace(/[\\s-]+/g, '_');\n}\n\nfunction toDate(value) {\n  if (value === null || value === undefined || value === '') return null;\n  if (typeof value === 'number' || /^\\d+$/.test(String(value))) {\n    const secs = Number(value);\n    const ms = secs > 1e12 ? secs : secs * 1000;\n    const d = new Date(ms);\n    return isNaN(d.getTime()) ? null : d;\n  }\n  const d = new Date(value);\n  return isNaN(d.getTime()) ? null : d;\n}\n\nfunction stripHtml(s) {\n  return String(s || '')\n    .replace(/\u003c[^>]*>/g, ' ')\n    .replace(/&nbsp;/g, ' ')\n    .replace(/&amp;/g, '&')\n    .replace(/&lt;/g, '\u003c')\n    .replace(/&gt;/g, '>')\n    .replace(/&#39;|&rsquo;|&apos;/g, \"'\")\n    .replace(/&quot;|&ldquo;|&rdquo;/g, '\"')\n    .replace(/\\s+/g, ' ')\n    .trim();\n}\n\nfunction clip(s, n) {\n  const str = String(s || '');\n  if (str.length \u003c= n) return str;\n  return str.slice(0, n - 1).replace(/\\s+\\S*$/, '') + '…';\n}\n\nfunction normCompany(c) {\n  return String(c || '')\n    .toLowerCase()\n    .replace(/[.,]/g, '')\n    .replace(/\\b(inc|llc|ltd|gmbh|co|corp|limited|company)\\b/g, '')\n    .replace(/\\s+/g, ' ')\n    .trim();\n}\n\nfunction firstAllowedType(types, allowed) {\n  for (const t of types) {\n    if (allowed.includes(normJobType(t))) return normJobType(t);\n  }\n  return '';\n}\n\nfunction fromRemotive(jobs) {\n  return (jobs || []).map((j) => {\n    const tags = Array.isArray(j.tags) ? j.tags.join(', ') : '';\n    return {\n      source: 'Remotive',\n      title: j.title || '',\n      company: j.company_name || '',\n      _types: [j.job_type],\n      location: j.candidate_required_location || 'Remote',\n      salary: j.salary || '',\n      url: j.url || '',\n      _date: toDate(j.publication_date),\n      tags,\n      _desc: stripHtml(j.description),\n      _website: '',\n      _logo: j.company_logo || '',\n      _direct: false,\n      _hay: `${j.title || ''} ${tags} ${j.category || ''} ${j.description || ''}`,\n    };\n  });\n}\n\nfunction fromJobicy(jobs) {\n  return (jobs || []).map((j) => {\n    let salary = '';\n    if (j.salaryMin || j.salaryMax) {\n      const cur = j.salaryCurrency || '';\n      salary = `${cur} ${j.salaryMin || '?'}–${j.salaryMax || '?'}`.trim();\n    }\n    const tags = Array.isArray(j.jobIndustry) ? j.jobIndustry.join(', ') : '';\n    return {\n      source: 'Jobicy',\n      title: j.jobTitle || '',\n      company: j.companyName || '',\n      _types: Array.isArray(j.jobType) ? j.jobType : [j.jobType],\n      location: j.jobGeo || 'Remote',\n      salary,\n      url: j.url || '',\n      _date: toDate(j.pubDate),\n      tags,\n      _desc: stripHtml(j.jobDescription || j.jobExcerpt),\n      _website: '',\n      _logo: j.companyLogo || '',\n      _direct: false,\n      _hay: `${j.jobTitle || ''} ${tags} ${j.jobExcerpt || ''} ${j.jobDescription || ''}`,\n    };\n  });\n}\n\nconst JSEARCH_TYPE = { FULLTIME: 'full_time', PARTTIME: 'part_time', CONTRACTOR: 'contract', INTERN: 'intern' };\n\nfunction fromJSearch(jobs) {\n  return (jobs || []).map((j) => {\n    let salary = '';\n    if (j.job_min_salary || j.job_max_salary) {\n      const cur = j.job_salary_currency || '';\n      const per = j.job_salary_period ? '/' + String(j.job_salary_period).toLowerCase() : '';\n      salary = `${cur} ${j.job_min_salary || '?'}–${j.job_max_salary || '?'}${per}`.trim();\n    }\n    const loc = j.job_is_remote ? 'Remote'\n      : [j.job_city, j.job_country].filter(Boolean).join(', ') || 'Remote';\n    return {\n      source: j.job_publisher || 'JSearch',\n      title: j.job_title || '',\n      company: j.employer_name || '',\n      _types: (Array.isArray(j.job_employment_types) && j.job_employment_types.length\n        ? j.job_employment_types\n        : [j.job_employment_type]).map((t) => JSEARCH_TYPE[t] || t),\n      location: loc,\n      salary,\n      url: j.job_apply_link || '',\n      _date: toDate(j.job_posted_at_datetime_utc),\n      tags: j.job_publisher || '',\n      _desc: stripHtml(j.job_description),\n      _website: j.employer_website || '',\n      _logo: j.employer_logo || '',\n      _direct: j.job_apply_is_direct === true,\n      _hay: `${j.job_title || ''} ${j.job_publisher || ''} ${j.job_description || ''}`,\n    };\n  });\n}\n\nfunction matchesKeyword(row, keywords) {\n  const hay = String(row._hay || `${row.title} ${row.tags}`).toLowerCase();\n  return keywords.some((k) => hay.includes(k.toLowerCase()));\n}\n\nfunction computeTrust(row, sourceCount) {\n  let score = 40;\n  const reasons = [];\n  if (row.salary && String(row.salary).trim()) { score += 20; reasons.push('salary disclosed'); }\n  if (sourceCount >= 2) { score += 15; reasons.push(`cross-posted on ${sourceCount} boards`); }\n  const days = row._date ? Math.floor((Date.now() - row._date.getTime()) / 86400000) : null;\n  if (days !== null) {\n    if (days \u003c= 7) { score += 12; reasons.push('posted this week'); }\n    else if (days \u003c= 14) { score += 8; reasons.push('posted recently'); }\n    else if (days \u003c= 30) { score += 4; }\n  }\n  if (row._website) { score += 8; reasons.push('verified company website'); }\n  if (row._logo) { score += 3; }\n  if (row._direct) { score += 7; reasons.push('direct application'); }\n  if (REPUTABLE_BOARDS.some((p) => String(row.source).toLowerCase().includes(p))) {\n    score += 8; reasons.push('reputable job board');\n  }\n  score = Math.max(0, Math.min(100, score));\n  const band = score >= 80 ? 'High' : score >= 60 ? 'Good' : 'Basic';\n  return { score, band, reasons };\n}\n\nfunction buildRows(mappedBySource, config) {\n  const cfg = Object.assign({}, DEFAULT_CONFIG, config || {});\n  const cutoff = cfg.maxAgeDays\n    ? Date.now() - cfg.maxAgeDays * 24 * 60 * 60 * 1000\n    : null;\n  const all = [].concat.apply([], Object.keys(mappedBySource).map((k) => mappedBySource[k]));\n\n  const companySources = new Map();\n  for (const row of all) {\n    const key = normCompany(row.company);\n    if (!key) continue;\n    if (!companySources.has(key)) companySources.set(key, new Set());\n    companySources.get(key).add(String(row.source).toLowerCase());\n  }\n\n  const seenUrl = new Set();\n  const seenTitle = new Set();\n  const out = [];\n  for (const row of all) {\n    const jobType = firstAllowedType(row._types || [], cfg.allowedTypes);\n    if (!jobType) continue;\n    if (cfg.requireKeyword && !matchesKeyword(row, cfg.keywords)) continue;\n    const titleLc = (row.title || '').toLowerCase();\n    if ((cfg.blockTitleKeywords || []).some((k) => titleLc.includes(k))) continue;\n    const titleExcluded = (cfg.excludeTitleKeywords || []).some((k) => titleLc.includes(k));\n    const titleOnTopic = cfg.keywords.some((k) => titleLc.includes(k.toLowerCase()));\n    if (titleExcluded && !titleOnTopic) continue;\n    if (cutoff && row._date && row._date.getTime() \u003c cutoff) continue;\n    // dedupe by URL OR normalized title (JSearch cross-posts one role to several boards with\n    // different URLs and different employer strings, so collapse on title).\n    const urlKey = (row.url || '').toLowerCase().trim();\n    const titleKey = (row.title || '').toLowerCase().replace(/\\s+/g, ' ').trim();\n    if ((urlKey && seenUrl.has(urlKey)) || (titleKey && seenTitle.has(titleKey))) continue;\n    if (urlKey) seenUrl.add(urlKey);\n    if (titleKey) seenTitle.add(titleKey);\n\n    const sourceCount = (companySources.get(normCompany(row.company)) || new Set()).size || 1;\n    const trust = computeTrust(row, sourceCount);\n\n    out.push({\n      source: row.source,\n      title: row.title,\n      company: row.company,\n      job_type: jobType,\n      location: row.location,\n      salary: row.salary,\n      posted_date: row._date ? row._date.toISOString().slice(0, 10) : '',\n      url: row.url,\n      tags: row.tags,\n      description: clip(row._desc || '', 400),\n      summary: '',\n      company_website: row._website || '',\n      company_logo: row._logo || '',\n      trust_score: trust.score,\n      trust_band: trust.band,\n      trust_reasons: trust.reasons.join('; '),\n      _ts: row._date ? row._date.getTime() : 0,\n    });\n  }\n  out.sort((a, b) => b._ts - a._ts);\n  return out.map((r) => { const c = Object.assign({}, r); delete c._ts; return c; });\n}\n// ===== END inlined core ====================================================\n\n// ----- n8n glue ------------------------------------------------------------\n\n/** Pull the array at `key` from an HTTP node's JSON body; [] if node failed/missing. */\nfunction readApiArray(nodeName, key) {\n  try {\n    const items = $(nodeName).all();\n    if (!items.length) return [];\n    const body = items[0].json || {};\n    return Array.isArray(body[key]) ? body[key] : [];\n  } catch (e) {\n    return [];\n  }\n}\n\n/**\n * JSearch's jobs array. /search-v2 nests them at `data.jobs` (data is an object);\n * the legacy /search returned `data` as the array directly. Handle both. [] on failure.\n */\nfunction readJSearchJobs() {\n  try {\n    const items = $('JSearch').all();\n    if (!items.length) return [];\n    const body = items[0].json || {};\n    const d = body.data;\n    if (Array.isArray(d)) return d;                 // legacy /search\n    if (d && Array.isArray(d.jobs)) return d.jobs;  // /search-v2\n    return [];\n  } catch (e) {\n    return [];\n  }\n}\n\n/** Read overrides from the \"Config\" Set node; falls back to code defaults. */\nfunction readConfig() {\n  let raw = {};\n  try { raw = $('Config').first().json || {}; } catch (e) { raw = {}; }\n  const cfg = {};\n  if (raw.maxAgeDays !== undefined && raw.maxAgeDays !== '') cfg.maxAgeDays = Number(raw.maxAgeDays);\n  if (raw.allowedTypes) cfg.allowedTypes = String(raw.allowedTypes).split(',').map((s) => s.trim()).filter(Boolean);\n  if (raw.requireKeyword !== undefined) cfg.requireKeyword = raw.requireKeyword === true || raw.requireKeyword === 'true';\n  return cfg;\n}\n\nconst remotiveJobs = readApiArray('Remotive', 'jobs');\nconst jobicyJobs = readApiArray('Jobicy', 'jobs');\nconst jsearchJobs = readJSearchJobs(); // [] when the node/credential is absent\n\nconst rows = buildRows(\n  {\n    remotive: fromRemotive(remotiveJobs),\n    jobicy: fromJobicy(jobicyJobs),\n    jsearch: fromJSearch(jsearchJobs),\n  },\n  readConfig(),\n);\n\nif (rows.length === 0) {\n  return [{ json: { empty: true, count: 0 } }];\n}\nreturn rows.map((r) => ({ json: r }));\n"}},{"id":"node-if","name":"Has Results?","type":"n8n-nodes-base.if","typeVersion":2.2,"position":[900,320],"parameters":{"conditions":{"options":{"caseSensitive":true,"typeValidation":"loose","version":2},"combinator":"and","conditions":[{"id":"c1","leftValue":"={{ $json.empty }}","rightValue":"","operator":{"type":"boolean","operation":"true","singleValue":true}}]},"options":{}}},{"id":"node-email-empty","name":"Email No Results","type":"n8n-nodes-base.gmail","typeVersion":2.1,"position":[1140,200],"parameters":{"resource":"message","operation":"send","sendTo":"={{ $('Config').first().json.recipient }}","subject":"=Weekly AI Automation Part-Time Jobs — {{ $now.toFormat('yyyy-LL-dd') }} (no matches)","emailType":"html","message":"=\u003ch2>Weekly AI Automation — Part-Time Jobs\u003c/h2>\u003cp>No part-time / contract / freelance automation roles matched this week on Remotive, Jobicy or JSearch. I'll check again next Monday.\u003c/p>","options":{}}},{"id":"node-prep","name":"Prep Summaries","type":"n8n-nodes-base.code","typeVersion":2,"position":[1120,440],"parameters":{"mode":"runOnceForAllItems","jsCode":"/**\n * prep-summaries.js — body of the n8n Code node \"Prep Summaries\".\n * Mode: \"Run Once for All Items\".\n *\n * Collapses the N job items from \"Compile Jobs\" into ONE item so the Gemini HTTP\n * node fires a SINGLE batched call (cost stays flat regardless of job count). The\n * output item carries:\n *   - jobs:       the full job rows, untouched, for \"Apply Summaries\" to re-expand.\n *   - geminiBody: the exact JSON request body for Gemini's generateContent endpoint,\n *                 asking for a one-sentence summary per role as a strict JSON array.\n */\n\nconst items = $input.all().map((i) => i.json);\n\n// Compact payload for the model — index + the minimum it needs to summarize.\nconst jobsForLlm = items.map((j, idx) => ({\n  i: idx,\n  title: j.title || '',\n  company: j.company || '',\n  job_type: j.job_type || '',\n  location: j.location || '',\n  desc: String(j.description || '').slice(0, 500),\n}));\n\nconst instruction =\n  'You are a job-market analyst. For EACH job object below, write ONE concise, ' +\n  'factual sentence (max 22 words) that says what the role involves and, if clear, ' +\n  'what the employer does. No hype, no \"exciting opportunity\". ' +\n  'Return ONLY a JSON array like [{\"i\":0,\"summary\":\"...\"}] — one object per job, ' +\n  'matching the \"i\" index. No markdown, no code fences.\\n\\nJobs:\\n' +\n  JSON.stringify(jobsForLlm);\n\nconst geminiBody = {\n  contents: [{ parts: [{ text: instruction }] }],\n  generationConfig: {\n    temperature: 0.2,\n    maxOutputTokens: 2048,\n    responseMimeType: 'application/json',\n  },\n};\n\nreturn [{ json: { jobs: items, count: items.length, geminiBody } }];\n"}},{"id":"node-gemini","name":"Gemini","type":"n8n-nodes-base.httpRequest","typeVersion":4.2,"position":[1320,440],"parameters":{"method":"POST","url":"https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent","authentication":"genericCredentialType","genericAuthType":"httpHeaderAuth","sendBody":true,"contentType":"json","specifyBody":"json","jsonBody":"={{ JSON.stringify($json.geminiBody) }}","options":{"timeout":30000,"response":{"response":{"responseFormat":"json"}}}},"onError":"continueRegularOutput","retryOnFail":true,"maxTries":2,"waitBetweenTries":3000},{"id":"node-apply","name":"Apply Summaries","type":"n8n-nodes-base.code","typeVersion":2,"position":[1520,440],"parameters":{"mode":"runOnceForAllItems","jsCode":"/**\n * apply-summaries.js — body of the n8n Code node \"Apply Summaries\".\n * Mode: \"Run Once for All Items\".\n *\n * Re-expands the single batched item back to one item per job, attaching the\n * one-line `summary` from Gemini. If Gemini failed, errored, or returned\n * unparseable output, each job falls back to the first sentence of its own\n * description — so the report NEVER breaks on an LLM hiccup.\n *\n * Reads \"Prep Summaries\" (the retained job rows) and \"Gemini\" (the raw response).\n */\n\nconst jobs = (() => {\n  try { return $('Prep Summaries').first().json.jobs || []; } catch (e) { return []; }\n})();\n\n// Parse Gemini's JSON array of { i, summary } into an index -> summary map. Any\n// failure (node errored, empty body, non-JSON, wrapped in ```json fences) => {}.\nfunction parseSummaries() {\n  const map = {};\n  try {\n    const resp = $('Gemini').first().json || {};\n    let text =\n      (resp.candidates &&\n        resp.candidates[0] &&\n        resp.candidates[0].content &&\n        resp.candidates[0].content.parts &&\n        resp.candidates[0].content.parts[0] &&\n        resp.candidates[0].content.parts[0].text) || '';\n    text = String(text).replace(/^```(?:json)?/i, '').replace(/```$/, '').trim();\n    const arr = JSON.parse(text);\n    if (Array.isArray(arr)) {\n      for (const o of arr) {\n        if (o && typeof o.i === 'number') map[o.i] = String(o.summary || '').trim();\n      }\n    }\n  } catch (e) {\n    // leave map empty -> everything falls back to the description snippet\n  }\n  return map;\n}\n\n/** First sentence of the description, else a trimmed slice, as the no-LLM fallback. */\nfunction firstSentence(desc) {\n  const d = String(desc || '').trim();\n  if (!d) return '';\n  const m = d.match(/^.*?[.!?](\\s|$)/);\n  return (m ? m[0] : d).trim().slice(0, 200);\n}\n\nconst summaries = parseSummaries();\n\nreturn jobs.map((j, idx) => {\n  const s = summaries[idx];\n  const summary = (s && s.length ? s : firstSentence(j.description)).slice(0, 200);\n  return { json: Object.assign({}, j, { summary }) };\n});\n"}},{"id":"node-report","name":"Build Report","type":"n8n-nodes-base.code","typeVersion":2,"position":[1720,440],"parameters":{"mode":"runOnceForAllItems","jsCode":"/**\n * build-report.js — body of the n8n Code node \"Build Report\".\n * Mode: \"Run Once for All Items\".\n *\n * Turns the summarized+scored job rows (from \"Apply Summaries\") into the whole\n * deliverable, in ONE place so all presentation logic is testable together:\n *   - json.chart_url : a QuickChart image URL (top companies by Trust score).\n *   - json.html      : the full HTML email body (chart + per-role cards).\n *   - json.subject   : the email subject line.\n *   - json.count     : role count (for the Data Table / logging).\n *   - binary.data    : a styled, Excel-compatible .xls (opens in Excel/Sheets with\n *                      colored headers, a colored Trust column, and clickable links).\n *\n * The .xls is an HTML table saved with an .xls extension — the only way to ship a\n * *styled* spreadsheet from n8n Cloud, which blocks external Code-node libraries\n * (exceljs) and whose \"Convert to File\" node can't format cells. Excel/Google Sheets\n * open it with the formatting intact.\n */\n\n// ---------- pure helpers (kept side-effect free for offline testing) ----------\n\nfunction esc(s) {\n  return String(s == null ? '' : s)\n    .replace(/&/g, '&amp;')\n    .replace(/\u003c/g, '&lt;')\n    .replace(/>/g, '&gt;')\n    .replace(/\"/g, '&quot;');\n}\n\nconst BAND_COLOR = { High: '#16a34a', Good: '#d97706', Basic: '#6b7280' };\nconst BAND_BG = { High: '#dcfce7', Good: '#fef3c7', Basic: '#f3f4f6' };\n\n/** QuickChart horizontal bar of the top companies by (max) Trust score. */\nfunction buildChartUrl(jobs) {\n  const byCompany = {};\n  for (const j of jobs) {\n    const c = j.company || 'Unknown';\n    const band = j.trust_band || 'Basic';\n    if (!byCompany[c] || j.trust_score > byCompany[c].score) {\n      byCompany[c] = { score: j.trust_score || 0, band };\n    }\n  }\n  const top = Object.keys(byCompany)\n    .map((c) => ({ company: c, score: byCompany[c].score, band: byCompany[c].band }))\n    .sort((a, b) => b.score - a.score)\n    .slice(0, 8);\n\n  const config = {\n    type: 'horizontalBar',\n    data: {\n      labels: top.map((t) => (t.company.length > 26 ? t.company.slice(0, 25) + '…' : t.company)),\n      datasets: [{\n        label: 'Trust score',\n        data: top.map((t) => t.score),\n        backgroundColor: top.map((t) => BAND_COLOR[t.band] || BAND_COLOR.Basic),\n        borderWidth: 0,\n      }],\n    },\n    options: {\n      legend: { display: false },\n      title: { display: true, text: 'Company Trust Score (0–100)', fontSize: 16 },\n      scales: { xAxes: [{ ticks: { beginAtZero: true, max: 100, stepSize: 20 } }] },\n    },\n  };\n  return 'https://quickchart.io/chart?w=600&h=320&bkg=white&c=' +\n    encodeURIComponent(JSON.stringify(config));\n}\n\n// Palette for the initial-avatar background, picked deterministically from the name.\nconst AVATAR_BG = ['#4f46e5', '#0891b2', '#059669', '#d97706', '#dc2626', '#7c3aed', '#db2777'];\n\n/** A small round avatar with the company's initial. We deliberately DON'T hotlink the\n *  employer logo — several boards (e.g. Remotive) 403 hotlinked logos, which renders as\n *  a broken image in the email. A colored initial is always reliable. */\nfunction avatar(job) {\n  const name = (job.company || '?').trim();\n  const initial = esc(name.charAt(0).toUpperCase() || '?');\n  let h = 0;\n  for (let i = 0; i \u003c name.length; i++) h = (h * 31 + name.charCodeAt(i)) >>> 0;\n  const bg = AVATAR_BG[h % AVATAR_BG.length];\n  return '\u003cdiv style=\"width:40px;height:40px;border-radius:8px;background:' + bg + ';color:#fff;' +\n    'font:600 18px sans-serif;text-align:center;line-height:40px\">' + initial + '\u003c/div>';\n}\n\nfunction trustBadge(job) {\n  const band = job.trust_band || 'Basic';\n  return '\u003cspan style=\"display:inline-block;padding:2px 10px;border-radius:999px;font:600 12px sans-serif;' +\n    'color:' + (BAND_COLOR[band] || BAND_COLOR.Basic) + ';background:' + (BAND_BG[band] || BAND_BG.Basic) +\n    '\">Trust ' + esc(job.trust_score) + ' · ' + esc(band) + '\u003c/span>';\n}\n\nfunction jobCard(job) {\n  const meta = [job.job_type, job.location, job.posted_date, job.salary]\n    .filter(Boolean).map(esc).join(' &nbsp;·&nbsp; ');\n  return '' +\n    '\u003ctr>\u003ctd style=\"padding:16px 0;border-bottom:1px solid #eee\">' +\n    '\u003ctable width=\"100%\" cellpadding=\"0\" cellspacing=\"0\">\u003ctr>' +\n    '\u003ctd width=\"52\" valign=\"top\">' + avatar(job) + '\u003c/td>' +\n    '\u003ctd valign=\"top\">' +\n    '\u003cdiv style=\"font:600 16px sans-serif;color:#111\">' +\n    '\u003ca href=\"' + esc(job.url) + '\" style=\"color:#4f46e5;text-decoration:none\">' + esc(job.title) + '\u003c/a>\u003c/div>' +\n    '\u003cdiv style=\"font:400 14px sans-serif;color:#374151;margin:2px 0 6px\">' + esc(job.company) +\n    ' &nbsp; ' + trustBadge(job) + '\u003c/div>' +\n    '\u003cdiv style=\"font:400 13px sans-serif;color:#6b7280;margin-bottom:6px\">' + meta + '\u003c/div>' +\n    '\u003cdiv style=\"font:400 14px sans-serif;color:#111;line-height:1.45\">' + esc(job.summary || job.description) + '\u003c/div>' +\n    (job.trust_reasons ? '\u003cdiv style=\"font:400 12px sans-serif;color:#9ca3af;margin-top:6px\">✓ ' +\n      esc(job.trust_reasons) + '\u003c/div>' : '') +\n    '\u003cdiv style=\"margin-top:10px\">\u003ca href=\"' + esc(job.url) + '\" ' +\n    'style=\"display:inline-block;padding:7px 14px;background:#4f46e5;color:#fff;border-radius:6px;' +\n    'font:600 13px sans-serif;text-decoration:none\">Apply →\u003c/a>\u003c/div>' +\n    '\u003c/td>\u003c/tr>\u003c/table>\u003c/td>\u003c/tr>';\n}\n\nfunction buildEmailHtml(jobs, reportDate, chartUrl) {\n  const count = jobs.length;\n  const avg = count ? Math.round(jobs.reduce((s, j) => s + (j.trust_score || 0), 0) / count) : 0;\n  const high = jobs.filter((j) => (j.trust_band || '') === 'High').length;\n  const CARD_LIMIT = 12;\n  const shown = jobs.slice(0, CARD_LIMIT);\n  const cards = shown.map(jobCard).join('');\n  const more = count > CARD_LIMIT\n    ? '\u003cp style=\"font:400 14px sans-serif;color:#6b7280;text-align:center;margin:16px 0\">' +\n      '…and ' + (count - CARD_LIMIT) + ' more in the attached Excel file.\u003c/p>'\n    : '';\n\n  function stat(label, value) {\n    return '\u003ctd align=\"center\" style=\"padding:10px\">' +\n      '\u003cdiv style=\"font:700 22px sans-serif;color:#111\">' + value + '\u003c/div>' +\n      '\u003cdiv style=\"font:400 12px sans-serif;color:#6b7280\">' + label + '\u003c/div>\u003c/td>';\n  }\n\n  return '' +\n    '\u003cdiv style=\"background:#f3f4f6;padding:24px 0;font-family:sans-serif\">' +\n    '\u003cdiv style=\"max-width:640px;margin:0 auto;background:#fff;border-radius:12px;overflow:hidden;' +\n    'box-shadow:0 1px 3px rgba(0,0,0,.08)\">' +\n\n    // header\n    '\u003cdiv style=\"background:#4f46e5;padding:24px 28px\">' +\n    '\u003cdiv style=\"font:700 20px sans-serif;color:#fff\">Weekly AI-Automation Jobs\u003c/div>' +\n    '\u003cdiv style=\"font:400 14px sans-serif;color:#c7d2fe;margin-top:4px\">' +\n    'Part-time · contract · freelance &nbsp;|&nbsp; ' + esc(reportDate) + '\u003c/div>\u003c/div>' +\n\n    // stat row\n    '\u003ctable width=\"100%\" cellpadding=\"0\" cellspacing=\"0\" style=\"border-bottom:1px solid #eee\">' +\n    '\u003ctr>' + stat('roles', count) + stat('avg trust', avg + '/100') + stat('high trust', high) + '\u003c/tr>\u003c/table>' +\n\n    // chart\n    '\u003cdiv style=\"padding:20px 28px 4px;text-align:center\">' +\n    '\u003cdiv style=\"font:600 14px sans-serif;color:#374151;margin-bottom:8px;text-align:left\">' +\n    'Which employers look most legitimate?\u003c/div>' +\n    '\u003cimg src=\"' + esc(chartUrl) + '\" width=\"600\" style=\"max-width:100%;border:1px solid #eee;border-radius:8px\" alt=\"Company Trust Score chart\">' +\n    '\u003cdiv style=\"font:400 11px sans-serif;color:#9ca3af;margin:6px 0 0;text-align:left\">' +\n    'Trust score is a transparency signal (salary shown, cross-posting, verified site, recency, reputable board) — not an official employer rating.\u003c/div>' +\n    '\u003c/div>' +\n\n    // cards\n    '\u003cdiv style=\"padding:8px 28px 20px\">\u003ctable width=\"100%\" cellpadding=\"0\" cellspacing=\"0\">' +\n    cards + '\u003c/table>' + more + '\u003c/div>' +\n\n    // footer\n    '\u003cdiv style=\"padding:16px 28px;background:#fafafa;border-top:1px solid #eee;' +\n    'font:400 12px sans-serif;color:#9ca3af\">Sources: Remotive, Jobicy, JSearch ' +\n    '(Indeed / LinkedIn / Glassdoor / ZipRecruiter via Google for Jobs). ' +\n    'Summaries by Google Gemini. Generated automatically by n8n.\u003c/div>' +\n\n    '\u003c/div>\u003c/div>';\n}\n\n/** Styled Excel-compatible .xls (HTML table). Opens in Excel/Sheets with formatting. */\nfunction buildXlsHtml(jobs, reportDate) {\n  const count = jobs.length;\n  const avg = count ? Math.round(jobs.reduce((s, j) => s + (j.trust_score || 0), 0) / count) : 0;\n  const high = jobs.filter((j) => (j.trust_band || '') === 'High').length;\n  const good = jobs.filter((j) => (j.trust_band || '') === 'Good').length;\n  const basic = count - high - good;\n\n  const cols = [\n    { k: 'trust_score', h: 'Trust', w: 60 },\n    { k: 'trust_band', h: 'Band', w: 60 },\n    { k: 'title', h: 'Title', w: 260 },\n    { k: 'company', h: 'Company', w: 180 },\n    { k: 'job_type', h: 'Type', w: 90 },\n    { k: 'location', h: 'Location', w: 150 },\n    { k: 'salary', h: 'Salary', w: 130 },\n    { k: 'posted_date', h: 'Posted', w: 90 },\n    { k: 'summary', h: 'Summary', w: 360 },\n    { k: 'source', h: 'Source', w: 120 },\n  ];\n  const thStyle = 'background:#4f46e5;color:#fff;font:600 12px sans-serif;padding:8px;' +\n    'border:1px solid #4338ca;text-align:left';\n  const head = '\u003ctr>' + cols.map((c) =>\n    '\u003cth style=\"' + thStyle + ';width:' + c.w + 'px\">' + esc(c.h) + '\u003c/th>').join('') +\n    '\u003cth style=\"' + thStyle + '\">Link\u003c/th>\u003c/tr>';\n\n  const rows = jobs.map((j, idx) => {\n    const zebra = idx % 2 ? '#f8fafc' : '#ffffff';\n    const cells = cols.map((c) => {\n      let v = j[c.k];\n      let style = 'padding:6px 8px;border:1px solid #e5e7eb;font:400 12px sans-serif;' +\n        'background:' + zebra + ';vertical-align:top';\n      if (c.k === 'trust_band' || c.k === 'trust_score') {\n        style += ';font-weight:600;color:' + (BAND_COLOR[j.trust_band] || BAND_COLOR.Basic) +\n          ';background:' + (BAND_BG[j.trust_band] || BAND_BG.Basic) + ';text-align:center';\n      }\n      if (c.k === 'title') {\n        return '\u003ctd style=\"' + style + '\">\u003ca href=\"' + esc(j.url) + '\">' + esc(v) + '\u003c/a>\u003c/td>';\n      }\n      return '\u003ctd style=\"' + style + '\">' + esc(v) + '\u003c/td>';\n    }).join('');\n    const link = '\u003ctd style=\"padding:6px 8px;border:1px solid #e5e7eb;font:400 12px sans-serif;' +\n      'background:' + zebra + '\">\u003ca href=\"' + esc(j.url) + '\">open\u003c/a>\u003c/td>';\n    return '\u003ctr>' + cells + link + '\u003c/tr>';\n  }).join('');\n\n  const span = cols.length + 1; // +1 for the Link column\n  const banner = '\u003ctr>\u003ctd colspan=\"' + span + '\" style=\"background:#312e81;color:#fff;' +\n    'font:700 18px sans-serif;padding:14px 10px;border:1px solid #312e81\">' +\n    'Weekly AI-Automation Jobs &nbsp;·&nbsp; Part-time / Contract / Freelance &nbsp;·&nbsp; ' + esc(reportDate) +\n    '\u003c/td>\u003c/tr>';\n  const summary = '\u003ctr>\u003ctd colspan=\"' + span + '\" style=\"background:#eef2ff;color:#3730a3;' +\n    'font:600 13px sans-serif;padding:8px 10px;border:1px solid #c7d2fe\">' +\n    count + ' roles &nbsp;·&nbsp; avg trust ' + avg + '/100 &nbsp;·&nbsp; ' +\n    high + ' High · ' + good + ' Good · ' + basic + ' Basic &nbsp;·&nbsp; ' +\n    'Sources: Remotive, Jobicy, JSearch\u003c/td>\u003c/tr>';\n  const legend = '\u003ctr>\u003ctd colspan=\"' + span + '\" style=\"background:#ffffff;color:#6b7280;' +\n    'font:400 11px sans-serif;padding:6px 10px;border:1px solid #e5e7eb\">' +\n    'Trust bands: High ≥ 80 &nbsp; Good 60–79 &nbsp; Basic &lt; 60 &nbsp; — a transparency signal ' +\n    '(salary shown, cross-posting, verified site, recency, reputable board), not an official rating.\u003c/td>\u003c/tr>';\n  const spacer = '\u003ctr>\u003ctd colspan=\"' + span + '\" style=\"height:8px\">\u003c/td>\u003c/tr>';\n\n  return '\u003chtml>\u003chead>\u003cmeta charset=\"utf-8\">\u003c/head>\u003cbody>' + const CAT = {
  trigger:{c:'--trigger',label:'Trigger'}, code:{c:'--code',label:'Code'},
  http:{c:'--http',label:'HTTP'}, llm:{c:'--llm',label:'AI / LLM'},
  parser:{c:'--parser',label:'Output parser'}, comms:{c:'--comms',label:'Email'},
  logic:{c:'--logic',label:'Logic / data'},
};
function catOf(type){
  const t=type.toLowerCase();
  if(t.includes('trigger')) return 'trigger';
  if(t.endsWith('.code')) return 'code';
  if(t.includes('outputparser')) return 'parser';
  if(t.includes('lmchat')||t.includes('chainllm')||t.includes('agent')||t.includes('embeddings')) return 'llm';
  if(t.includes('gmail')||t.includes('emailsend')) return 'comms';
  if(t.includes('httprequest')) return 'http';
  return 'logic';
}
function iconText(type,cat){
  const t=type.toLowerCase();
  if(cat==='code') return '{ }';
  if(cat==='parser') return '{J}';
  if(cat==='llm') return 'AI';
  if(cat==='http') return 'GET';
  if(cat==='comms') return '@';
  if(t.includes('scheduletrigger')) return '⏱';
  if(t.includes('formtrigger')) return '▤';
  if(t.includes('trigger')) return '▶';
  if(t.includes('merge')) return '⩓';
  if(t.includes('.if')) return '♦';
  if(t.includes('.set')) return '=';
  if(t.includes('datatable')) return '☷';
  if(t.includes('converttofile')) return '⤓';
  return '⚙';
}
function prettyType(type){
  return type.replace('@n8n/n8n-nodes-langchain.','').replace('n8n-nodes-base.','');
}
const cssVar = (v)=>getComputedStyle(document.documentElement).getPropertyValue(v).trim();
const esc = (s)=>String(s).replace(/[&<>]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;'}[c]));

/* ---------- state ---------- */
let current=null, view={x:60,y:40,k:1}, selName=null;
const wrap=document.getElementById('wrap');
const canvas=document.getElementById('canvas');
const edges=document.getElementById('edges');
const panel=document.getElementById('panel');
const legend=document.getElementById('legend');

/* ---------- render one workflow ---------- */
function render(wf){
  current=wf; selName=null;
  canvas.innerHTML=''; edges.innerHTML='';
  const nodeByName={};
  // node boxes
  wf.nodes.forEach(n=>{
    const cat=catOf(n.type);
    const el=document.createElement('div');
    el.className='node'; el.dataset.name=n.name;
    el.style.left=n.position[0]+'px'; el.style.top=n.position[1]+'px';
    const col=cssVar('--'+CAT[cat].c.slice(2));
    const isTrigger=cat==='trigger';
    el.innerHTML=
      (isTrigger?'':'<div class="port in"></div>')+
      '<div class="port out"></div>'+
      '<div class="ic" style="background:'+col+'">'+esc(iconText(n.type,cat))+'</div>'+
      '<div class="body"><div class="nm">'+esc(n.name)+'</div>'+
      '<div class="ty">'+esc(prettyType(n.type))+'</div>'+
      (cat==='code'?'<span class="flag">function node</span>':'')+'</div>';
    el.addEventListener('click',(e)=>{e.stopPropagation();select(n.name);});
    canvas.appendChild(el);
    nodeByName[n.name]=el;
  });
  // measure bbox, normalize so min corner ~ (0,0)
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  wf.nodes.forEach(n=>{
    const el=nodeByName[n.name];
    const x=n.position[0], y=n.position[1];
    minX=Math.min(minX,x); minY=Math.min(minY,y);
    maxX=Math.max(maxX,x+el.offsetWidth); maxY=Math.max(maxY,y+el.offsetHeight);
  });
  const pad=80;
  wf.nodes.forEach(n=>{
    const el=nodeByName[n.name];
    el.style.left=(n.position[0]-minX+pad)+'px';
    el.style.top=(n.position[1]-minY+pad)+'px';
  });
  const W=maxX-minX+pad*2, H=maxY-minY+pad*2;
  canvas.style.width=W+'px'; canvas.style.height=H+'px';
  edges.setAttribute('width',W); edges.setAttribute('height',H);
  edges.setAttribute('viewBox','0 0 '+W+' '+H);

  drawEdges(wf,nodeByName);
  fit(W,H);
  buildCaption(wf);
  buildLegend(wf);
  closePanel();
}

/* ---------- edges ---------- */
function port(el,side){
  return {x:el.offsetLeft+(side==='out'?el.offsetWidth:0), y:el.offsetTop+el.offsetHeight/2,
          tx:el.offsetLeft+el.offsetWidth/2, top:el.offsetTop, bot:el.offsetTop+el.offsetHeight};
}
function drawEdges(wf,byName){
  const NS='http://www.w3.org/2000/svg';
  const mk=(d,cls,color)=>{
    const p=document.createElementNS(NS,'path');
    p.setAttribute('d',d); p.setAttribute('class',cls);
    p.setAttribute('fill','none'); p.setAttribute('stroke',color);
    p.setAttribute('stroke-width','2');
    if(cls==='ai') p.setAttribute('stroke-dasharray','5 5');
    edges.appendChild(p);
  };
  Object.entries(wf.connections).forEach(([from,conns])=>{
    const src=byName[from]; if(!src) return;
    Object.entries(conns).forEach(([kind,groups])=>{
      groups.forEach(group=>group.forEach(link=>{
        const dst=byName[link.node]; if(!dst) return;
        if(kind==='main'){
          const a=port(src,'out'), b=port(dst,'in');
          const dx=Math.max(40,Math.abs(b.x-a.x)*0.5);
          mk('M'+a.x+','+a.y+' C'+(a.x+dx)+','+a.y+' '+(b.x-dx)+','+b.y+' '+b.x+','+b.y,
             'main', '#454b66');
        }
      }));
    });
  });
  // ai links (model/parser -> chain) dashed + colored
  Object.entries(wf.connections).forEach(([from,conns])=>{
    const src=byName[from]; if(!src) return;
    Object.entries(conns).forEach(([kind,groups])=>{
      if(kind==='main') return;
      const color=kind==='ai_outputParser'?cssVar('--parser'):cssVar('--llm');
      groups.forEach(group=>group.forEach(link=>{
        const dst=byName[link.node]; if(!dst) return;
        const a=port(src), b=port(dst);
        // curve from source top-center up into destination bottom-center
        const ay=a.top, by=b.bot;
        const my=(ay+by)/2;
        mk('M'+a.tx+','+ay+' C'+a.tx+','+my+' '+b.tx+','+my+' '+b.tx+','+by,'ai',color);
      }));
    });
  });
}

/* ---------- pan / zoom ---------- */
function apply(){var t='translate('+view.x+'px,'+view.y+'px) scale('+view.k+')';canvas.style.transform=t;edges.style.transform=t;}
function fit(W,H){
  const r=wrap.getBoundingClientRect();
  const k=Math.min(1.1,(r.width-40)/W,(r.height-40)/H);
  view.k=Math.max(0.2,k);
  view.x=(r.width-W*view.k)/2; view.y=(r.height-H*view.k)/2;
  apply();
}
document.getElementById('fit').addEventListener('click',()=>{
  fit(canvas.offsetWidth,canvas.offsetHeight);
});
(function(){
  let drag=false,sx,sy,ox,oy;
  wrap.addEventListener('mousedown',e=>{
    if(e.target.closest('.node'))return;
    drag=true;sx=e.clientX;sy=e.clientY;ox=view.x;oy=view.y;wrap.classList.add('grabbing');
  });
  window.addEventListener('mousemove',e=>{
    if(!drag)return; view.x=ox+(e.clientX-sx); view.y=oy+(e.clientY-sy); apply();
  });
  window.addEventListener('mouseup',()=>{drag=false;wrap.classList.remove('grabbing');});
  wrap.addEventListener('wheel',e=>{
    e.preventDefault();
    const r=wrap.getBoundingClientRect();
    const mx=e.clientX-r.left, my=e.clientY-r.top;
    const f=e.deltaY<0?1.12:1/1.12;
    const nk=Math.min(2.4,Math.max(0.18,view.k*f));
    view.x=mx-(mx-view.x)*(nk/view.k); view.y=my-(my-view.y)*(nk/view.k); view.k=nk; apply();
  },{passive:false});
})();

/* ---------- selection + detail panel ---------- */
function select(name){
  selName=name;
  document.querySelectorAll('.node').forEach(el=>el.classList.toggle('sel',el.dataset.name===name));
  const n=current.nodes.find(x=>x.name===name);
  openPanel(n);
}
function closePanel(){
  panel.classList.remove('open'); legend.classList.remove('push');
  document.querySelectorAll('.node.sel').forEach(el=>el.classList.remove('sel'));
  selName=null;
}
wrap.addEventListener('click',e=>{if(!e.target.closest('.node'))closePanel();});

function field(title,inner){return '<div class="field"><h3>'+title+'</h3>'+inner+'</div>';}

/* very small, self-contained JS highlighter */
function hlJS(src){
  const KW=/\b(const|let|var|function|return|if|else|for|while|of|in|new|try|catch|throw|typeof|null|true|false|break|continue|do|switch|case|default|async|await)\b/g;
  const out=[]; let i=0;
  const tok=/(\/\/[^\n]*|\/\*[\s\S]*?\*\/)|('(?:[^'\\]|\\.)*'|"(?:[^"\\]|\\.)*"|`(?:[^`\\]|\\.)*`)/g;
  let m,last=0;
  function plain(s){
    return esc(s).replace(KW,'<span class="kw">$1</span>')
      .replace(/\b(\d+(?:\.\d+)?)\b/g,'<span class="nm">$1</span>')
      .replace(/([A-Za-z_$][\w$]*)(?=\s*\()/g,'<span class="fn">$1</span>');
  }
  while((m=tok.exec(src))){
    out.push(plain(src.slice(last,m.index)));
    if(m[1]) out.push('<span class="cm">'+esc(m[1])+'</span>');
    else out.push('<span class="st">'+esc(m[2])+'</span>');
    last=tok.lastIndex;
  }
  out.push(plain(src.slice(last)));
  return out.join('');
}
function hlPrompt(src){
  return esc(src).replace(/(\{\{[\s\S]*?\}\})/g,'<span class="expr">$1</span>');
}

function bodyFor(n){
  const p=n.parameters||{}; const t=n.type.toLowerCase();
  let h='';
  if(t.endsWith('.code')){
    const mode=p.mode==='runOnceForEachItem'?'Run once for each item':'Run once for all items';
    h+=field('Mode','<div class="val mut">'+mode+'</div>');
    h+=field('JavaScript','<pre class="code">'+hlJS(p.jsCode||'')+'</pre>');
    return h;
  }
  if(t.includes('chainllm')){
    h+=field('Prompt','<div class="prompt">'+hlPrompt((p.text||'').replace(/^=/,''))+'</div>');
    if(p.hasOutputParser) h+=field('Output','<div class="val mut">Parsed into a structured schema (see the amber parser node).</div>');
    return h;
  }
  if(t.includes('lmchat')){
    const model=(p.options&&p.options)||{};
    h+=field('Model','<div class="val">'+esc(p.modelName||p.model&&(p.model.value||p.model)||'Google Gemini')+'</div>');
    h+=field('Role','<div class="val mut">Language model powering the AI chain nodes it links to.</div>');
    return h;
  }
  if(t.includes('outputparser')){
    const schema=p.jsonSchemaExample||p.jsonSchema||p.manualJsonSchema||p.schemaType||'';
    h+=field('Structured output','<div class="val mut">Forces the linked AI node to return JSON matching this shape.</div>');
    if(schema) h+=field('Schema','<pre class="code">'+esc(typeof schema==='string'?schema:JSON.stringify(schema,null,2))+'</pre>');
    return h;
  }
  if(t.includes('httprequest')){
    const kv=[['Method',(p.method||'GET')],['URL',(p.url||'').replace(/^=/,'')]];
    if(p.options&&p.options.timeout) kv.push(['Timeout',p.options.timeout+' ms']);
    if(n.retryOnFail) kv.push(['Retry','up to '+(n.maxTries||2)+' tries']);
    h+=field('Request','<dl class="kv">'+kv.map(([k,v])=>'<dt>'+k+'</dt><dd>'+esc(v)+'</dd>').join('')+'</dl>');
    if(p.sendQuery&&p.queryParameters) h+=field('Query','<dl class="kv">'+
      p.queryParameters.parameters.map(q=>'<dt>'+esc(q.name)+'</dt><dd>'+esc(String(q.value).replace(/^=/,''))+'</dd>').join('')+'</dl>');
    return h;
  }
  if(t.includes('formtrigger')){
    const fields=(p.formFields&&p.formFields.values)||[];
    h+=field('Form',(p.formTitle?'<div class="val">'+esc(p.formTitle)+'</div>':''));
    h+=field('Fields','<ul class="fields">'+fields.map(f=>'<li>'+esc(f.fieldLabel)+
      (f.requiredField?'<span class="req">REQUIRED</span>':'')+'</li>').join('')+'</ul>');
    return h;
  }
  if(t.includes('scheduletrigger')){
    h+=field('Schedule','<div class="val mut">Runs on a fixed weekly cadence (Mon & Thu, 08:00).</div>');
    return h;
  }
  if(t.includes('.set')){
    const a=(p.assignments&&p.assignments.assignments)||[];
    h+=field('Sets','<dl class="kv">'+a.map(x=>'<dt>'+esc(x.name)+'</dt><dd>'+esc(String(x.value).replace(/^=/,''))+'</dd>').join('')+'</dl>');
    return h;
  }
  if(t.includes('gmail')){
    const kv=[];
    if(p.sendTo) kv.push(['To',String(p.sendTo).replace(/^=/,'')]);
    if(p.subject) kv.push(['Subject',String(p.subject).replace(/^=/,'')]);
    h+=field('Email',kv.length?'<dl class="kv">'+kv.map(([k,v])=>'<dt>'+k+'</dt><dd>'+esc(v)+'</dd>').join('')+'</dl>':'<div class="val mut">Sends the finished report by Gmail.</div>');
    return h;
  }
  // fallback: pretty params
  const keys=Object.keys(p);
  if(!keys.length) return field('Configuration','<div class="val mut">No parameters — structural node.</div>');
  return field('Parameters','<pre class="code">'+esc(JSON.stringify(p,null,2)).slice(0,4000)+'</pre>');
}

function openPanel(n){
  const cat=catOf(n.type);
  const col=cssVar('--'+CAT[cat].c.slice(2));
  document.getElementById('p-ic').style.background=col;
  document.getElementById('p-ic').textContent=iconText(n.type,cat);
  document.getElementById('p-name').textContent=n.name;
  document.getElementById('p-type').textContent=prettyType(n.type)+'  ·  '+CAT[cat].label;
  document.getElementById('p-body').innerHTML=bodyFor(n);

  const codeCount=wf.nodes.filter(n=>catOf(n.type)==='code').length;

  c.innerHTML='<h1>'+esc(wf.name)+'</h1><p>'+esc(wf.tagline)+'</p>'+

  view.k=Math.max(view.k,0.9);

  render(wf);
  try{ history.replaceState(null,'','#'+wf.id); }catch(e){ /* sandboxed iframe / about:blank */ }
}
WORKFLOWS.forEach(w=>{
  const b=document.getElementById('tab-'+w.id);
  b.addEventListener('click',()=>selectWorkflow(w.id));
});
window.addEventListener('resize',()=>{if(current)fit(canvas.offsetWidth,canvas.offsetHeight);});
const startId=(location.hash||'').replace('#','');
selectWorkflow(WORKFLOWS.some(w=>w.id===startId)?startId:WORKFLOWS[0].id);
</script>
</body>
</html>
