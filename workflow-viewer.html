<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>n8n Workflow Viewer — John Ryan Haban</title>
<style>
:root{
  --bg:#171922; --panel:#1e2130; --panel-2:#262a3b; --line:#2f3346;
  --text:#e8eaf2; --muted:#99a0b8; --faint:#727892; --accent:#f2617a;
  --trigger:#23c17f; --code:#5b8cff; --http:#35b7c4; --llm:#b072f0;
  --parser:#e0a33a; --comms:#e8734a; --logic:#8a93ad;
  --ui:'Segoe UI',system-ui,-apple-system,'Helvetica Neue',Arial,sans-serif;
  --mono:'Cascadia Code','JetBrains Mono','Fira Code',Consolas,'SF Mono',ui-monospace,monospace;
}
*{box-sizing:border-box}
html,body{height:100%}
body{margin:0;background:var(--bg);color:var(--text);font-family:var(--ui);
  font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden}
button{font-family:inherit;color:inherit;cursor:pointer}
.app{display:flex;flex-direction:column;height:100vh}

/* ---- top bar ---- */
.bar{display:flex;align-items:center;gap:20px;padding:12px 20px;
  background:var(--panel);border-bottom:1px solid var(--line);flex:none;z-index:5}
.brand{display:flex;align-items:baseline;gap:10px;min-width:0}
.brand b{font-size:15px;font-weight:650;letter-spacing:.2px}
.brand .dot{width:8px;height:8px;border-radius:50%;background:var(--accent);
  display:inline-block;transform:translateY(-1px)}
.brand small{color:var(--faint);font-size:12px;white-space:nowrap}
.tabs{display:flex;gap:6px;margin-left:6px}
.tab{background:transparent;border:1px solid var(--line);color:var(--muted);
  padding:7px 14px;border-radius:8px;font-size:13px;font-weight:550;transition:.15s}
.tab:hover{border-color:#3c415a;color:var(--text)}
.tab[aria-selected="true"]{background:var(--panel-2);color:var(--text);
  border-color:#454b66;box-shadow:inset 0 0 0 1px rgba(242,97,122,.25)}
.bar-right{margin-left:auto;display:flex;align-items:center;gap:14px}
.hint{color:var(--faint);font-size:12px}
.hint kbd{font-family:var(--mono);background:var(--panel-2);border:1px solid var(--line);
  border-radius:5px;padding:1px 6px;font-size:11px;color:var(--muted)}
.btn{background:var(--panel-2);border:1px solid var(--line);color:var(--muted);
  padding:6px 12px;border-radius:8px;font-size:12.5px;font-weight:550}
.btn:hover{color:var(--text);border-color:#454b66}

/* ---- stage ---- */
.stage{position:relative;flex:1;display:flex;min-height:0}
.canvas-wrap{position:relative;flex:1;overflow:hidden;cursor:grab;
  background-image:radial-gradient(circle at 1px 1px,rgba(255,255,255,.045) 1px,transparent 0);
  background-size:26px 26px}
.canvas-wrap.grabbing{cursor:grabbing}
.canvas{position:absolute;top:0;left:0;transform-origin:0 0;will-change:transform}
.edges{position:absolute;top:0;left:0;overflow:visible;pointer-events:none;transform-origin:0 0;will-change:transform}

/* ---- node ---- */
.node{position:absolute;width:212px;background:var(--panel);border:1px solid var(--line);
  border-radius:12px;padding:12px 13px;display:flex;gap:11px;align-items:flex-start;
  box-shadow:0 6px 18px rgba(0,0,0,.28);transition:border-color .12s,box-shadow .12s,transform .12s}
.node:hover{border-color:#4a5170;transform:translateY(-1px)}
.node.sel{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent),0 10px 26px rgba(0,0,0,.4)}
.node .ic{flex:none;width:34px;height:34px;border-radius:9px;display:grid;place-items:center;
  font-weight:700;font-size:12px;font-family:var(--mono);color:#0d0f16;letter-spacing:-.5px}
.node .body{min-width:0}
.node .nm{font-size:13px;font-weight:600;line-height:1.25;color:var(--text);
  word-break:break-word}
.node .ty{font-size:11px;color:var(--faint);margin-top:3px;text-transform:uppercase;
  letter-spacing:.4px}
.node .flag{display:inline-block;margin-top:6px;font-size:10.5px;font-weight:700;
  color:var(--code);background:rgba(91,140,255,.13);border:1px solid rgba(91,140,255,.3);
  padding:1px 7px;border-radius:20px;letter-spacing:.3px}
.port{position:absolute;width:11px;height:11px;border-radius:50%;background:var(--panel-2);
  border:2px solid var(--faint);top:50%}
.port.in{left:-6px;transform:translateY(-50%)}
.port.out{right:-6px;transform:translateY(-50%);border-color:var(--muted)}

/* ---- detail panel ---- */
.panel{width:min(42vw,460px);flex:none;background:var(--panel);border-left:1px solid var(--line);
  display:flex;flex-direction:column;transform:translateX(100%);transition:transform .22s ease;
  position:absolute;right:0;top:0;bottom:0;z-index:4}
.panel.open{transform:none}
.panel-head{padding:18px 20px 14px;border-bottom:1px solid var(--line);flex:none}
.panel-head .krow{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.panel-head .ic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;
  font-weight:700;font-size:11px;font-family:var(--mono);color:#0d0f16}
.panel-head h2{margin:0;font-size:17px;font-weight:650;line-height:1.25}
.panel-head .sub{color:var(--muted);font-size:12.5px;font-family:var(--mono)}
.panel-close{position:absolute;top:14px;right:14px;background:transparent;border:0;
  color:var(--faint);font-size:20px;line-height:1;padding:4px 8px;border-radius:6px}
.panel-close:hover{color:var(--text);background:var(--panel-2)}
.panel-body{overflow:auto;padding:18px 20px 28px;flex:1}
.field{margin-bottom:18px}
.field h3{margin:0 0 7px;font-size:11px;font-weight:700;letter-spacing:.7px;
  text-transform:uppercase;color:var(--faint)}
.field .val{font-size:13px;color:var(--text);word-break:break-word}
.field .val.mut{color:var(--muted)}
.kv{display:grid;grid-template-columns:auto 1fr;gap:4px 14px;font-size:12.5px}
.kv dt{color:var(--muted)}
.kv dd{margin:0;color:var(--text);font-family:var(--mono);word-break:break-all}
ul.fields{margin:0;padding-left:18px;font-size:13px}
ul.fields li{margin-bottom:5px}
ul.fields .req{color:var(--accent);font-size:11px;font-weight:700;margin-left:5px}
pre.code{margin:0;background:#12141d;border:1px solid var(--line);border-radius:10px;
  padding:14px;overflow:auto;font-family:var(--mono);font-size:12.5px;line-height:1.6;
  color:#c9cee0;max-height:62vh}
pre.code .cm{color:#5f6786;font-style:italic}
pre.code .st{color:#8fd4a0}
pre.code .kw{color:#f2617a}
pre.code .nm{color:#e0a33a}
pre.code .fn{color:#5b8cff}
.prompt{white-space:pre-wrap;background:#12141d;border:1px solid var(--line);border-radius:10px;
  padding:14px;font-size:12.5px;line-height:1.55;color:#cdd3e6;font-family:var(--mono);
  max-height:62vh;overflow:auto}
.prompt .expr{color:#b072f0}
.empty{color:var(--faint);font-size:13px;padding:40px 20px;text-align:center;max-width:280px;
  margin:auto}

/* ---- caption card ---- */
.caption{position:absolute;left:18px;bottom:18px;max-width:340px;background:rgba(30,33,48,.92);
  border:1px solid var(--line);border-radius:14px;padding:15px 17px;backdrop-filter:blur(6px);
  box-shadow:0 10px 30px rgba(0,0,0,.4);z-index:3}
.caption h1{margin:0 0 6px;font-size:15px;font-weight:650}
.caption p{margin:0 0 11px;font-size:12.5px;color:var(--muted);line-height:1.5}
.caption .meta{display:flex;flex-wrap:wrap;gap:6px;align-items:center}
.pill{font-size:11px;padding:3px 9px;border-radius:20px;background:var(--panel-2);
  border:1px solid var(--line);color:var(--muted)}
.pill.hot{color:var(--code);border-color:rgba(91,140,255,.4);background:rgba(91,140,255,.1);
  cursor:pointer}
.chips{display:flex;flex-wrap:wrap;gap:5px;margin-top:9px}
.chip{font-size:10.5px;padding:2px 8px;border-radius:6px;background:var(--panel-2);
  color:var(--faint);border:1px solid var(--line)}

/* ---- legend ---- */
.legend{position:absolute;right:18px;bottom:18px;display:flex;gap:14px;flex-wrap:wrap;
  background:rgba(30,33,48,.9);border:1px solid var(--line);border-radius:12px;padding:10px 14px;
  z-index:3;font-size:11.5px;color:var(--muted);max-width:min(46vw,460px)}
.legend.push{right:calc(min(42vw,460px) + 18px)}
.legend span{display:flex;align-items:center;gap:6px}
.legend i{width:10px;height:10px;border-radius:3px;display:inline-block}
@media (max-width:720px){
  .caption{max-width:min(78vw,340px)}
  .panel{width:100vw}
  .legend{display:none}
  .hint{display:none}
}
</style>
</head>
<body>

<div class="app">
  <header class="bar">
    <div class="brand"><span class="dot"></span><b>n8n Workflow Viewer</b>
      <small>a live-canvas stand-in — runs entirely offline</small></div>
    <div class="tabs">
      <button class="tab" id="tab-competitive-edge" data-id="competitive-edge">Competitive Edge Campaign Builder</button><button class="tab" id="tab-job-report" data-id="job-report">Weekly AI Automation Part-Time Job Report</button>
    </div>
    <div class="bar-right">
      <span class="hint">drag to pan · <kbd>scroll</kbd> to zoom · click a node</span>
      <button class="btn" id="fit">Fit</button>
    </div>
  </header>
  <div class="stage">
    <div class="canvas-wrap" id="wrap">
      <svg class="edges" id="edges" xmlns="http://www.w3.org/2000/svg"></svg>
      <div class="canvas" id="canvas"></div>
      <div class="caption" id="caption"></div>
      <div class="legend" id="legend"></div>
    </div>
    <aside class="panel" id="panel" aria-label="Node detail">
      <div class="panel-head">
        <button class="panel-close" id="p-close" aria-label="Close">×</button>
        <div class="krow"><div class="ic" id="p-ic"></div><h2 id="p-name"></h2></div>
        <div class="sub" id="p-type"></div>
      </div>
      <div class="panel-body" id="p-body"></div>
    </aside>
  </div>
</div>

<script>
const WORKFLOWS = [{"id":"competitive-edge","name":"Competitive Edge Campaign Builder","tagline":"One company URL in → competitor gap analysis + a ready-to-post ad campaign, emailed as a themed PDF.","tech":["n8n","Google Gemini","DuckDuckGo","PDFShift","Gmail"],"trigger":"On-demand · web form","nodes":[{"name":"Campaign Request Form","type":"n8n-nodes-base.formTrigger","typeVersion":2.6,"position":[240,300],"parameters":{"path":"competitive-edge","formTitle":"Competitive Edge — Campaign Builder","formDescription":"Enter a company and get a competitor gap analysis plus a ready-to-post ad campaign, emailed to you within a few minutes.","formFields":{"values":[{"fieldLabel":"Company website URL","placeholder":"https://example.com","requiredField":true},{"fieldLabel":"Company name","placeholder":"(optional) leave blank to auto-detect","requiredField":false},{"fieldLabel":"Target audience","fieldType":"textarea","placeholder":"(optional) who the campaign should speak to","requiredField":false},{"fieldLabel":"Your name / brand","placeholder":"(optional) shown as 'prepared by'","requiredField":false},{"fieldLabel":"Notify email","fieldType":"email","placeholder":"your email — where to send the report","requiredField":true}]},"responseMode":"onReceived","options":{"formSubmittedText":"Thanks! Your Competitive Edge report is being generated and will land in your inbox in a few minutes."}}},{"name":"Normalize Input","type":"n8n-nodes-base.code","typeVersion":2,"position":[480,300],"parameters":{"mode":"runOnceForAllItems","jsCode":"// Normalize Input — n8n Code node (Run Once for All Items)\n// Cleans the form submission: extracts a hostname from almost any input\n// (bare domain, www, protocol-relative //, full URL, trailing slashes) without\n// relying on new URL() — which can be strict/inconsistent in the sandbox.\nconst f = $json;\n\nfunction pick(...names) {\n  for (const n of names) {\n    if (f[n] != null && String(f[n]).trim() !== '') return String(f[n]).trim();\n  }\n  return '';\n}\n\nconst raw = pick('Company website URL', 'Company website', 'companyUrl', 'url', 'Website');\nif (!raw) throw new Error('Please enter the company website (for example: boscoffee.com).');\n\n// Strip an optional scheme + any leading slashes, then a leading \"www.\".\nlet cleaned = raw.replace(/^\\s*(https?:)?\\/+/i, '').replace(/^www\\./i, '');\n// Host = everything up to the first slash / query / hash / whitespace.\nconst host = cleaned.split(/[\\/?#\\s]/)[0].toLowerCase();\n\nif (!host || !host.includes('.')) {\n  throw new Error('That does not look like a website: \"' + raw + '\". Try something like boscoffee.com');\n}\n\nconst companyUrl = 'https://' + host;\n// The explicit form field, if the operator typed one (may be ''). Kept separate from the\n// domain fallback so downstream can prefer: user-entered > AI-detected > domain slug.\nconst userCompanyName = pick('Company name', 'companyName');\n// companyLabel: a never-empty name for the prompts. The domain slug is a last resort — the\n// report upgrades this to the AI-detected company_name in Aggregate Context.\nconst companyLabel = userCompanyName\n  || host.split('.')[0].replace(/[-_]+/g, ' ').replace(/\\b\\w/g, (c) => c.toUpperCase());\n\n// Where to send the report. Required by the form, but guard here too: a bad/blank address\n// should fail loudly rather than silently bounce to a placeholder like you@example.com.\nconst notifyEmail = pick('Notify email', 'email');\nif (!/^[^@\\s]+@[^@\\s]+\\.[^@\\s]+$/.test(notifyEmail)) {\n  throw new Error('Please enter a valid notify email (where the report should be sent).');\n}\n\nreturn [{\n  json: {\n    companyUrl,\n    companyHost: host,\n    companyLabel,\n    userCompanyName,\n    audience: pick('Target audience', 'audience') || \"the company's core customers\",\n    senderName: pick('Your name / brand', 'Your brand', 'senderName') || 'AI Automation',\n    notifyEmail,\n  },\n}];\n"}},{"name":"Fetch Company Site","type":"n8n-nodes-base.httpRequest","typeVersion":4.2,"position":[720,300],"parameters":{"method":"GET","url":"={{ $json.companyUrl }}","sendHeaders":true,"headerParameters":{"parameters":[{"name":"User-Agent","value":"CompetitiveEdgeBot/1.0 (+https://n8n.io; contact: sales-demo)"}]},"options":{"timeout":12000,"response":{"response":{"responseFormat":"text","neverError":true}}}},"onError":"continueRegularOutput","retryOnFail":true,"maxTries":2,"waitBetweenTries":1500,"alwaysOutputData":true},{"name":"Clean Company Text","type":"n8n-nodes-base.code","typeVersion":2,"position":[960,300],"parameters":{"mode":"runOnceForAllItems","jsCode":"// Clean Company Text — n8n Code node (Run Once for Each Item)\n// Strips a fetched HTML page down to visible text (regex port of the\n// BeautifulSoup logic in the old scrape_business_site.py).\nconst MAX = 4000;\n\nfunction htmlToText(html) {\n  if (!html || typeof html !== 'string') return '';\n  return html\n    .replace(/\u003cscript[\\s\\S]*?\u003c\\/script>/gi, ' ')\n    .replace(/\u003cstyle[\\s\\S]*?\u003c\\/style>/gi, ' ')\n    .replace(/\u003cnoscript[\\s\\S]*?\u003c\\/noscript>/gi, ' ')\n    .replace(/\u003c(nav|footer|header)[\\s\\S]*?\u003c\\/\\1>/gi, ' ')\n    .replace(/\u003c!--[\\s\\S]*?-->/g, ' ')\n    .replace(/\u003c[^>]+>/g, ' ')\n    .replace(/&nbsp;/g, ' ')\n    .replace(/&amp;/g, '&').replace(/&lt;/g, '\u003c').replace(/&gt;/g, '>').replace(/&quot;/g, '\"').replace(/&#39;/g, \"'\")\n    .replace(/\\s+/g, ' ')\n    .trim();\n}\n\n// httpRequest (response format = text) puts the body in $json.data\nconst body = $json.data || $json.body || '';\nconst text = htmlToText(body).slice(0, MAX);\n\nreturn [{\n  json: {\n    companyText: text,\n    companyTextChars: text.length,\n    thin: text.length \u003c 150,\n  },\n}];\n"}},{"name":"Company Profile","type":"@n8n/n8n-nodes-langchain.chainLlm","typeVersion":1.9,"position":[1200,300],"parameters":{"promptType":"define","text":"=You are a market analyst. From the company's own website text below, identify what the business actually is and craft a web-search query that will surface its DIRECT competitors.\n\nCompany (as entered): {{ $('Normalize Input').item.json.companyLabel }}\nWebsite: {{ $('Normalize Input').item.json.companyUrl }}\n\nWebsite text:\n\"\"\"\n{{ $json.companyText }}\n\"\"\"\n\nReturn:\n- company_name: the business's real name.\n- industry: a short category (e.g. \"specialty coffee roaster\", \"boutique fitness studio\", \"B2B payroll SaaS\").\n- location: city/region if discernible from the text, otherwise an empty string.\n- search_query: a short, literal Google query that returns SIMILAR competitors, not this company. Prefer the form \"\u003ccategory> in \u003clocation>\" when a location exists, otherwise \"\u003ccategory> companies\" or \"best \u003ccategory>\". Do not include the company's own name.\n\nIf the website text is empty or unhelpful, infer the best you can from the company name and URL.","hasOutputParser":true},"retryOnFail":true,"maxTries":3,"waitBetweenTries":2000,"onError":"continueRegularOutput"},{"name":"DuckDuckGo Search","type":"n8n-nodes-base.httpRequest","typeVersion":4.2,"position":[1440,300],"parameters":{"method":"GET","url":"https://html.duckduckgo.com/html/","sendQuery":true,"queryParameters":{"parameters":[{"name":"q","value":"={{ $json.output.search_query }}"}]},"sendHeaders":true,"headerParameters":{"parameters":[{"name":"User-Agent","value":"Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/124.0.0.0 Safari/537.36"},{"name":"Accept-Language","value":"en-US,en;q=0.9"}]},"options":{"timeout":15000,"response":{"response":{"responseFormat":"text","neverError":true}}}},"onError":"continueRegularOutput","retryOnFail":true,"maxTries":2,"waitBetweenTries":1500,"alwaysOutputData":true},{"name":"Extract Competitors","type":"n8n-nodes-base.code","typeVersion":2,"position":[1680,300],"parameters":{"mode":"runOnceForAllItems","jsCode":"// Extract Competitors — n8n Code node (Run Once for All Items)\n// Parses DuckDuckGo HTML results (keyless search) into a clean, deduped\n// competitor list (max 3), filtering out the company's own domain and\n// non-competitor aggregator/directory sites. Emits ONE ITEM PER COMPETITOR\n// so the next HTTP node scrapes each in turn.\nconst norm = $('Normalize Input').first().json;\nconst ownHost = (norm.companyHost || '').toLowerCase();\n\n// The DuckDuckGo HTML page arrives as a string (httpRequest responseFormat=text).\nconst htmlBody = $json.data || $json.body || '';\n\nconst BLOCK = [\n  'yelp.', 'facebook.', 'instagram.', 'tripadvisor.', 'wikipedia.', 'reddit.',\n  'youtube.', 'linkedin.', 'amazon.', 'google.', 'maps.', 'doordash.', 'ubereats.',\n  'grubhub.', 'opentable.', 'foursquare.', 'mapquest.', 'bbb.org', 'indeed.',\n  'glassdoor.', 'pinterest.', 'tiktok.', 'x.com', 'twitter.', 'apple.',\n  'duckduckgo.', 'bing.', 'yellowpages.', 'thumbtack.', 'angi.', 'nextdoor.',\n];\n\nfunction hostOf(u) {\n  try { return new URL(u).hostname.replace(/^www\\./, '').toLowerCase(); }\n  catch (e) { return ''; }\n}\n\n// DuckDuckGo wraps every result link as //duckduckgo.com/l/?uddg=\u003cencoded real url>&...\n// Decode uddg back to the real destination; fall back to any absolute http link.\nfunction decodeDdg(href) {\n  if (!href) return '';\n  let h = href;\n  if (h.startsWith('//')) h = 'https:' + h;\n  const m = h.match(/[?&]uddg=([^&]+)/);\n  if (m) { try { return decodeURIComponent(m[1]); } catch (e) { return ''; } }\n  return /^https?:\\/\\//i.test(h) ? h : '';\n}\n\n// Pull the result anchors. DDG HTML uses class=\"result__a\" on result title links;\n// be tolerant of attribute order / extra classes.\nconst anchorRe = /\u003ca\\b[^>]*class=\"[^\"]*\\bresult__a\\b[^\"]*\"[^>]*href=\"([^\"]+)\"[^>]*>([\\s\\S]*?)\u003c\\/a>/gi;\nconst stripTags = (s) => String(s || '').replace(/\u003c[^>]+>/g, '').replace(/&amp;/g, '&').replace(/&#x27;|&#39;/g, \"'\").replace(/&quot;/g, '\"').replace(/\\s+/g, ' ').trim();\nconst titleToName = (t) => stripTags(t).split(/[|\\-–—:·•]/)[0].trim().slice(0, 60);\n\nconst seen = new Set([ownHost]);\nconst competitors = [];\nlet m;\nwhile ((m = anchorRe.exec(htmlBody)) !== null) {\n  const url = decodeDdg(m[1]);\n  if (!url) continue;\n  const host = hostOf(url);\n  if (!host || seen.has(host)) continue;\n  if (host === ownHost || host.endsWith('.' + ownHost) || ownHost.endsWith('.' + host)) continue;\n  if (BLOCK.some(b => host.includes(b))) continue;\n  seen.add(host);\n  competitors.push({\n    name: titleToName(m[2]) || host.split('.')[0],\n    url: 'https://' + host,\n    host,\n  });\n  if (competitors.length >= 3) break;\n}\n\n// Always return at least one item so the branch runs; mark when empty.\nif (competitors.length === 0) {\n  return [{ json: { name: '', url: '', host: '', _noCompetitors: true } }];\n}\nreturn competitors.map(c => ({ json: c }));\n"}},{"name":"Fetch Competitor Site","type":"n8n-nodes-base.httpRequest","typeVersion":4.2,"position":[1920,300],"parameters":{"method":"GET","url":"={{ $json.url || 'https://example.com' }}","sendHeaders":true,"headerParameters":{"parameters":[{"name":"User-Agent","value":"CompetitiveEdgeBot/1.0 (+https://n8n.io; contact: sales-demo)"}]},"options":{"timeout":12000,"response":{"response":{"responseFormat":"text","neverError":true}}}},"onError":"continueRegularOutput","retryOnFail":true,"maxTries":2,"waitBetweenTries":1500,"alwaysOutputData":true},{"name":"Clean Competitor Text","type":"n8n-nodes-base.code","typeVersion":2,"position":[2160,300],"parameters":{"mode":"runOnceForAllItems","jsCode":"// Clean Competitor Text — n8n Code node (Run Once for All Items)\n// Strips each fetched competitor page to visible text. Preserves competitor\n// identity by aligning to Extract Competitors by index (HTTP preserves order),\n// and tolerates dead/empty fetches so one bad site never breaks the run.\nconst MAX = 2500;\n\nfunction htmlToText(html) {\n  if (!html || typeof html !== 'string') return '';\n  return html\n    .replace(/\u003cscript[\\s\\S]*?\u003c\\/script>/gi, ' ')\n    .replace(/\u003cstyle[\\s\\S]*?\u003c\\/style>/gi, ' ')\n    .replace(/\u003cnoscript[\\s\\S]*?\u003c\\/noscript>/gi, ' ')\n    .replace(/\u003c(nav|footer|header)[\\s\\S]*?\u003c\\/\\1>/gi, ' ')\n    .replace(/\u003c!--[\\s\\S]*?-->/g, ' ')\n    .replace(/\u003c[^>]+>/g, ' ')\n    .replace(/&nbsp;/g, ' ')\n    .replace(/&amp;/g, '&').replace(/&lt;/g, '\u003c').replace(/&gt;/g, '>').replace(/&quot;/g, '\"').replace(/&#39;/g, \"'\")\n    .replace(/\\s+/g, ' ')\n    .trim();\n}\n\nconst metas = $('Extract Competitors').all().map(i => i.json);\nconst items = $input.all();\n\nreturn items.map((it, idx) => {\n  const meta = metas[idx] || {};\n  const body = it.json.data || it.json.body || '';\n  const text = htmlToText(body).slice(0, MAX);\n  return {\n    json: {\n      name: meta.name || '',\n      url: meta.url || '',\n      host: meta.host || '',\n      competitorText: text,\n      reachable: text.length >= 120,\n    },\n  };\n});\n"}},{"name":"Aggregate Context","type":"n8n-nodes-base.code","typeVersion":2,"position":[2400,300],"parameters":{"mode":"runOnceForAllItems","jsCode":"// Aggregate Context — n8n Code node (Run Once for All Items)\n// Merges the company context with every scraped competitor into a single\n// item + a preformatted text block the Gap Analysis prompt can drop straight in.\nconst norm = $('Normalize Input').first().json;\nconst company = $('Clean Company Text').first().json;\nconst profile = ($('Company Profile').first().json.output) || {};\n\n// Resolve the display/analysis name once, here, so the clean name flows into BOTH the\n// Gap Analysis prompt ($json.companyLabel) and the Campaign prompt, and the report.\n// Priority: what the operator typed > what the AI detected from the site > domain slug.\nconst s = (v) => (typeof v === 'string' ? v.trim() : '');\nconst companyLabel = s(norm.userCompanyName) || s(profile.company_name) || norm.companyLabel;\n// industry + location are used to build the report's meta line (industry · location).\nconst industry = s(profile.industry);\nconst location = s(profile.location);\n\nconst items = $input.all().map(i => i.json).filter(c => c && c.name);\nconst competitors = items.filter(c => !c._noCompetitors);\n\nconst reachable = competitors.filter(c => c.reachable);\n\nconst competitorsBlock = competitors.length\n  ? competitors.map((c, i) =>\n      `Competitor ${i + 1}: ${c.name} (${c.url})\\n` +\n      (c.reachable ? c.competitorText : '[site could not be read — infer only from the name/URL]')\n    ).join('\\n\\n---\\n\\n')\n  : 'No competitors could be discovered via web search.';\n\nreturn [{\n  json: {\n    companyLabel,\n    industry,\n    location,\n    companyUrl: norm.companyUrl,\n    audience: norm.audience,\n    senderName: norm.senderName,\n    notifyEmail: norm.notifyEmail,\n    companyText: company.companyText || '',\n    companyThin: !!company.thin,\n    competitors: competitors.map(c => ({ name: c.name, url: c.url, reachable: !!c.reachable })),\n    competitorCount: competitors.length,\n    reachableCount: reachable.length,\n    competitorsBlock,\n  },\n}];\n"}},{"name":"Gap Analysis","type":"@n8n/n8n-nodes-langchain.chainLlm","typeVersion":1.9,"position":[2640,300],"parameters":{"promptType":"define","text":"=You are a competitive strategy analyst producing a market recon brief for {{ $json.companyLabel }}. Use ONLY the facts in the material below (the company's own site and its competitors' public sites). Never invent specific facts; when a competitor site could not be read, reason cautiously from its name/URL and mark uncertainty by choosing conservative ratings.\n\nTARGET COMPANY: {{ $json.companyLabel }} ({{ $json.companyUrl }})\nIts core audience: {{ $json.audience }}\n\nTARGET COMPANY WEBSITE TEXT:\n\"\"\"\n{{ $json.companyText }}\n\"\"\"\n\nCOMPETITORS (discovered via web search):\n\"\"\"\n{{ $json.competitorsBlock }}\n\"\"\"\n\nProduce a JSON analysis:\n- company_descriptor: a single short tagline or motto (max ~120 chars) capturing what the company stands for. Do NOT include the industry or location (those are shown separately) — just the essence, e.g. \"Authentic Filipino comfort food and barbecue, a family tradition since 1936.\"\n- company_summary: 2-3 sentences on the company's biggest competitive opening — where it is losing ground and the single strongest angle to win. Address the reader as \"you\".\n- limitations: 3-5 concrete gaps where the company trails competitors. Each { title (short bold phrase), detail (one sentence, cite a competitor where possible) }.\n- matrix: a capability comparison.\n  - columns: the competitors IN THE SAME ORDER as listed above, each { name, url }.\n  - rows: 4-6 capabilities relevant to this industry. Each { capability, subject_rating, competitor_ratings }. subject_rating is the target company's rating. competitor_ratings is an array aligned 1:1 with columns. Every rating is exactly one of: \"none\", \"partial\", \"have\".\n- recommendations: 3-5 prioritized moves to beat the market, ordered most-impactful first. Each { title (short bold action), detail (one sentence on how/why) }.\n- positioning_angle: one vivid sentence the marketing campaign should run on.\n- theme: choose the report's visual skin for this industry.\n  - industry: short industry label.\n  - preset_key: EXACTLY one of \"cozy_warm\" (food/drink/restaurants/hospitality), \"soft_luxe\" (beauty/salon/spa/cosmetics), \"clean_care\" (health/medical/dental/clinics), \"fresh_modern\" (tech/SaaS/startup/retail/e-commerce), \"trust_corporate\" (finance/legal/professional B2B/real estate/home services), \"vital_energetic\" (fitness/wellness/DTC), \"earthy_craft\" (artisan/handmade), or \"recon_neutral\" (anything else / unclear).\n  - accent_hex: a 6-digit hex (e.g. \"#a5673f\") that fits the brand, or \"\" to use the preset default.\n  - motif_key: the background pattern, chosen to MATCH THE INDUSTRY. Use \"beans\" ONLY for coffee shops / roasters / cafés; \"utensils\" for restaurants, food, bakeries & catering; \"bloom\" for beauty / salon / spa / cosmetics; \"plus\" for health / medical / dental / clinics; \"tags\" for retail / shops / e-commerce; \"roofline\" for real estate / property / home services; \"grid\" for tech / SaaS / apps; \"lines\" for finance / legal / professional B2B; \"pulse\" for fitness / gym / wellness; \"radar\" for anything else or when unsure.\n  - rationale: a few words on why this skin fits.","hasOutputParser":true},"retryOnFail":true,"maxTries":3,"waitBetweenTries":2000,"onError":"continueRegularOutput"},{"name":"Campaign Copy","type":"@n8n/n8n-nodes-langchain.chainLlm","typeVersion":1.9,"position":[2880,300],"parameters":{"promptType":"define","text":"=You write concise, specific, non-generic marketing copy. Avoid flattery clichés and buzzwords. Ground every asset in the company's real positioning below. Never invent facts. Output copy the company itself would publish to its OWN customers — this is the company's ad campaign, not a cold pitch to the company.\n\nCOMPANY: {{ $('Aggregate Context').item.json.companyLabel }}\nAUDIENCE: {{ $('Aggregate Context').item.json.audience }}\nPOSITIONING ANGLE: {{ $('Gap Analysis').item.json.output.positioning_angle }}\nTOP RECOMMENDED MOVES:\n{{ ($('Gap Analysis').item.json.output.recommendations || []).map(r => '- ' + r.title + ': ' + r.detail).join('\\n') }}\n\nWrite one coordinated campaign built around the positioning angle and (where natural) the #1 recommended move:\n- email: { subject (under 60 chars, specific, no clickbait), body_paragraphs: an array of 5-7 SHORT paragraphs — greeting, 2-3 body lines that reference a concrete detail, one call-to-action line, a closing line, and a sign-off. Each array element is a plain-text paragraph (no HTML). }\n- linkedin: a 60-120 word post in the company's voice.\n- x_post: a single post UNDER 280 characters.\n- instagram_caption: a 40-80 word caption.\n- hashtags: 4-6 relevant hashtags (with or without the leading #).","hasOutputParser":true},"retryOnFail":true,"maxTries":3,"waitBetweenTries":2000,"onError":"continueRegularOutput"},{"name":"Assemble Report","type":"n8n-nodes-base.code","typeVersion":2,"position":[3120,300],"parameters":{"mode":"runOnceForAllItems","jsCode":"// ============================================================================\n// Assemble Report  —  n8n Code node (Run Once for All Items)\n// Builds the final themed HTML email from the analysis + campaign outputs.\n// Industry-adaptive: picks a theme preset from Gap Analysis' `theme.preset_key`,\n// falls back to `recon_neutral` for unknown industries. Motifs are inline SVG\n// (email clients strip external/background images; the themed color always carries).\n// ============================================================================\n\n// ---- pull upstream data (guarded so a partial run still emails something) ---\nconst norm = $('Normalize Input').first().json;\nconst gap = ($('Gap Analysis').first().json.output) || {};\nconst camp = ($('Campaign Copy').first().json.output) || {};\nconst agg = $('Aggregate Context').first().json;\n\nconst competitors = agg.competitors || [];\nconst theme = gap.theme || {};\n\n// ---------------------------------------------------------------------------\n// THEME PRESETS  — each supplies only the tokens that differ; the CSS below is\n// shared. Add presets here to teach the report a new industry look.\n// ---------------------------------------------------------------------------\nconst THEMES = {\n  recon_neutral: {\n    label: 'recon_neutral', motif: 'radar',\n    fonts: {\n      display: \"'Bahnschrift','DIN Condensed','Arial Narrow','Helvetica Neue',sans-serif\",\n      body: \"Georgia,'Sitka Text','Times New Roman',serif\",\n      label: \"'Bahnschrift','DIN Condensed','Segoe UI',sans-serif\",\n    },\n    vars: {\n      ink:'#14203a', inkSoft:'#33405c', muted:'#5a6577', paper:'#f3f5f8', card:'#ffffff',\n      hairline:'#e0e5ec', hairlineStrong:'#cfd6e0', brand:'#0e6e6a', brandDeep:'#0a4f4c',\n      gap:'#c24236', gapBg:'#f9e7e4', watch:'#b3801b', watchBg:'#f7eed9', have:'#2f8f5b', haveBg:'#e4f1e9',\n    },\n    masthead:'linear-gradient(150deg,#101a2c 0%,#16263f 55%,#123634 130%)',\n    mastheadText:'#eef2f7', kicker:'#6fd6cf', kickerRgb:'111,214,207',\n    subjectDesc:'#b9c4d4', metaLabel:'#8ea0b8', metaVal:'#dfe6ef',\n  },\n  cozy_warm: {\n    label: 'cozy_warm', motif: 'utensils',\n    fonts: {\n      display: \"'Palatino Linotype',Palatino,'Book Antiqua',Georgia,serif\",\n      body: \"Georgia,'Iowan Old Style','Times New Roman',serif\",\n      label: \"'Trebuchet MS','Segoe UI','Gill Sans',sans-serif\",\n    },\n    vars: {\n      ink:'#2c1e15', inkSoft:'#5a4433', muted:'#8a7563', paper:'#f6efe4', card:'#fffdf8',\n      hairline:'#e7dccb', hairlineStrong:'#d8c9b2', brand:'#a5673f', brandDeep:'#7a4a2b',\n      gap:'#b23a2e', gapBg:'#f6e3de', watch:'#b3801b', watchBg:'#f6ecd6', have:'#5c7a3a', haveBg:'#eaf0dc',\n    },\n    masthead:'linear-gradient(150deg,#2b1d14 0%,#3a2618 55%,#4a2f1a 130%)',\n    mastheadText:'#f4e9da', kicker:'#e0b483', kickerRgb:'224,180,131',\n    subjectDesc:'#d8c3aa', metaLabel:'#b79a7c', metaVal:'#ece0d0',\n  },\n  fresh_modern: {\n    label: 'fresh_modern', motif: 'grid',\n    fonts: {\n      display: \"'Segoe UI Semibold','Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif\",\n      body: \"'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif\",\n      label: \"'Segoe UI Semibold','Segoe UI',Roboto,Arial,sans-serif\",\n    },\n    vars: {\n      ink:'#0f1b2d', inkSoft:'#33455f', muted:'#5d6b80', paper:'#f4f7fb', card:'#ffffff',\n      hairline:'#e2e8f1', hairlineStrong:'#cbd5e3', brand:'#2563eb', brandDeep:'#1d4ed8',\n      gap:'#dc2b45', gapBg:'#fbe3e7', watch:'#c2820c', watchBg:'#f8efd7', have:'#16a34a', haveBg:'#dcf3e4',\n    },\n    masthead:'linear-gradient(150deg,#0b1220 0%,#122036 55%,#0b2a4a 130%)',\n    mastheadText:'#eaf1fb', kicker:'#7cc0ff', kickerRgb:'124,192,255',\n    subjectDesc:'#aabbd2', metaLabel:'#8497b3', metaVal:'#dbe6f5',\n  },\n  trust_corporate: {\n    label: 'trust_corporate', motif: 'lines',\n    fonts: {\n      display: \"Georgia,'Times New Roman',serif\",\n      body: \"Georgia,'Times New Roman',serif\",\n      label: \"'Segoe UI','Helvetica Neue',Arial,sans-serif\",\n    },\n    vars: {\n      ink:'#1a2432', inkSoft:'#3a4655', muted:'#606c7c', paper:'#f5f6f7', card:'#ffffff',\n      hairline:'#e3e6ea', hairlineStrong:'#cdd3da', brand:'#9a6b2f', brandDeep:'#7a5323',\n      gap:'#b23a34', gapBg:'#f6e4e2', watch:'#b3801b', watchBg:'#f6ecd8', have:'#3f7a52', haveBg:'#e4efe8',\n    },\n    masthead:'linear-gradient(150deg,#182231 0%,#20304a 55%,#1c2740 130%)',\n    mastheadText:'#eef1f5', kicker:'#d9b481', kickerRgb:'217,180,129',\n    subjectDesc:'#b6c0cd', metaLabel:'#8b97a6', metaVal:'#dde3ea',\n  },\n  soft_luxe: {\n    label: 'soft_luxe', motif: 'bloom',\n    fonts: {\n      display: \"'Didot','Bodoni MT','Playfair Display',Georgia,serif\",\n      body: \"Georgia,'Iowan Old Style','Times New Roman',serif\",\n      label: \"'Gill Sans','Gill Sans MT','Segoe UI',sans-serif\",\n    },\n    vars: {\n      ink:'#3a2530', inkSoft:'#5e4450', muted:'#997e88', paper:'#f8eef1', card:'#fffbfc',\n      hairline:'#eddce2', hairlineStrong:'#e0c7d0', brand:'#b0637d', brandDeep:'#8a4a60',\n      gap:'#c14a5a', gapBg:'#f8e2e6', watch:'#b58a4a', watchBg:'#f4ebda', have:'#6f8f5c', haveBg:'#e8efe1',\n    },\n    masthead:'linear-gradient(150deg,#3a2530 0%,#4e2f3f 55%,#5e3546 130%)',\n    mastheadText:'#f6e9ee', kicker:'#e6b3c4', kickerRgb:'230,179,196',\n    subjectDesc:'#e0c3d0', metaLabel:'#c79fb0', metaVal:'#efdde5',\n  },\n  clean_care: {\n    label: 'clean_care', motif: 'plus',\n    fonts: {\n      display: \"'Segoe UI Semibold','Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif\",\n      body: \"'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif\",\n      label: \"'Segoe UI Semibold','Segoe UI',Roboto,Arial,sans-serif\",\n    },\n    vars: {\n      ink:'#103a3a', inkSoft:'#35595a', muted:'#5f817f', paper:'#eef6f4', card:'#ffffff',\n      hairline:'#dcebe7', hairlineStrong:'#c6ddd7', brand:'#17968b', brandDeep:'#0f6b64',\n      gap:'#d3564e', gapBg:'#f8e5e2', watch:'#c1912a', watchBg:'#f6eed6', have:'#2f9f6f', haveBg:'#e0f2e9',\n    },\n    masthead:'linear-gradient(150deg,#0d3330 0%,#124b44 55%,#0f5a4e 130%)',\n    mastheadText:'#e9f5f1', kicker:'#7fd6c6', kickerRgb:'127,214,198',\n    subjectDesc:'#bcdcd4', metaLabel:'#93bdb4', metaVal:'#dcefe9',\n  },\n};\n// Aliases so the LLM has more industry vocabulary than there are hand-built skins.\nTHEMES.vital_energetic = THEMES.fresh_modern;\nTHEMES.earthy_craft = THEMES.cozy_warm;\nTHEMES.beauty_spa = THEMES.soft_luxe;\nTHEMES.health_medical = THEMES.clean_care;\nTHEMES.retail_shop = THEMES.fresh_modern;\n\n// Detected industry text drives deterministic fallbacks for BOTH the palette and the motif,\n// so the report still matches the business even when the LLM omits or mis-picks a key.\nconst industryText = String(agg.industry || theme.industry || '').toLowerCase();\n\n// industry -> theme palette (used only when the LLM's preset_key is missing/unknown).\nfunction presetFromIndustry(s) {\n  if (/coffee|roaster|caf[eé]|espresso|restaurant|dining|bistro|eatery|food|kitchen|grill|bakery|catering|bbq|barbecue|hospitality|hotel/.test(s)) return 'cozy_warm';\n  if (/beauty|salon|spa|cosmetic|skincare|skin care|\\bhair\\b|nail|makeup|barber|aesthetic|lash|brow/.test(s)) return 'soft_luxe';\n  if (/health|medical|clinic|dental|dentist|hospital|pharmacy|therap|physio|chiro|orthodont|veterinar|\\bvet\\b/.test(s)) return 'clean_care';\n  if (/financ|bank|legal|\\blaw\\b|insurance|account|consult|advisor|real ?estate|realtor|realty|property|construction|roofing|contractor|home service|plumb|hvac|landscap/.test(s)) return 'trust_corporate';\n  if (/saas|software|\\btech\\b|\\bapp\\b|platform|startup|\\bai\\b|data|cloud|\\bdev\\b|retail|shop|store|boutique|e-?commerce|ecommerce|apparel|clothing|fashion|fitness|gym|yoga|pilates|nutrition/.test(s)) return 'fresh_modern';\n  return '';\n}\nconst T = THEMES[theme.preset_key] || THEMES[presetFromIndustry(industryText)] || THEMES.recon_neutral;\n\n// Optional per-company accent tuning from the LLM (kept within the preset).\nconst isHex = (s) => typeof s === 'string' && /^#[0-9a-fA-F]{6}$/.test(s);\nconst brand = isHex(theme.accent_hex) ? theme.accent_hex : T.vars.brand;\n\n// Which decorative motif to draw. Prefer the AI's per-company choice; else infer from the\n// detected industry (so a café gets beans while a restaurant gets utensils); else the\n// theme preset's default. This keeps the masthead background matched to the business.\n// NOTE: the medical rule comes BEFORE fitness so \"wellness clinic\" is not read as a gym.\nconst VALID_MOTIFS = { beans:1, grid:1, lines:1, radar:1, utensils:1, pulse:1, tags:1, bloom:1, plus:1, roofline:1 };\nfunction motifFromIndustry(s) {\n  if (/coffee|roaster|caf[eé]|espresso|tea house/.test(s)) return 'beans';\n  if (/restaurant|dining|bistro|eatery|food|kitchen|grill|bakery|catering|bbq|barbecue/.test(s)) return 'utensils';\n  if (/beauty|salon|spa|cosmetic|skincare|skin care|\\bhair\\b|nail|makeup|barber|aesthetic|lash|brow/.test(s)) return 'bloom';\n  if (/health|medical|clinic|dental|dentist|hospital|pharmacy|therap|physio|chiro|orthodont|veterinar|\\bvet\\b/.test(s)) return 'plus';\n  if (/real ?estate|realtor|realty|property|construction|roofing|contractor|home service|plumb|hvac|landscap|cleaning/.test(s)) return 'roofline';\n  // Fitness before retail: \"boutique fitness gym\" should read as fitness, not a boutique shop.\n  if (/fitness|gym|wellness|yoga|pilates|nutrition/.test(s)) return 'pulse';\n  if (/saas|software|\\btech\\b|\\bapp\\b|platform|startup|\\bai\\b|data|cloud|\\bdev\\b/.test(s)) return 'grid';\n  if (/retail|shop|store|boutique|e-?commerce|ecommerce|apparel|clothing|fashion|merch/.test(s)) return 'tags';\n  if (/financ|bank|legal|\\blaw\\b|insurance|account|consult|advisor/.test(s)) return 'lines';\n  return '';\n}\nconst motifKind = VALID_MOTIFS[theme.motif_key] ? theme.motif_key\n  : (motifFromIndustry(industryText) || T.motif);\n\n// ---------------------------------------------------------------------------\n// MOTIFS — decorative masthead SVG, one per style. Purely additive.\n// ---------------------------------------------------------------------------\nfunction motifSvg(kind, rgb) {\n  const c = `rgb(${rgb})`;\n  if (kind === 'beans') {\n    return `\u003csvg class=\"motif\" viewBox=\"0 0 420 420\" fill=\"none\" aria-hidden=\"true\">\u003cg stroke=\"${c}\" stroke-width=\"1.4\" opacity=\"0.85\">`\n      + `\u003cg transform=\"translate(300,90) rotate(28)\">\u003cellipse rx=\"26\" ry=\"17\"/>\u003cpath d=\"M0 -15 C 8 -6,8 6,0 15\"/>\u003c/g>`\n      + `\u003cg transform=\"translate(360,180) rotate(-14)\">\u003cellipse rx=\"24\" ry=\"15\"/>\u003cpath d=\"M0 -13 C 7 -5,7 5,0 13\"/>\u003c/g>`\n      + `\u003cg transform=\"translate(250,200) rotate(52)\">\u003cellipse rx=\"22\" ry=\"14\"/>\u003cpath d=\"M0 -12 C 6 -4,6 4,0 12\"/>\u003c/g>`\n      + `\u003cg transform=\"translate(330,290) rotate(8)\">\u003cellipse rx=\"25\" ry=\"16\"/>\u003cpath d=\"M0 -14 C 7 -5,7 5,0 14\"/>\u003c/g>\u003c/g>`\n      + `\u003cg stroke=\"${c}\" stroke-width=\"2\" opacity=\"0.3\" stroke-linecap=\"round\">\u003cpath d=\"M120 300 C 138 270,102 250,120 220 C 138 190,102 170,120 140\"/>\u003cpath d=\"M160 320 C 178 290,142 270,160 240 C 178 210,142 190,160 160\"/>\u003c/g>\u003c/svg>`;\n  }\n  if (kind === 'grid') {\n    return `\u003csvg class=\"motif\" viewBox=\"0 0 420 420\" fill=\"none\" aria-hidden=\"true\">\u003cg stroke=\"${c}\" stroke-width=\"1\" opacity=\"0.5\">`\n      + Array.from({length:9}, (_,i)=>`\u003cline x1=\"${i*52}\" y1=\"0\" x2=\"${i*52}\" y2=\"420\"/>\u003cline x1=\"0\" y1=\"${i*52}\" x2=\"420\" y2=\"${i*52}\"/>`).join('')\n      + `\u003c/g>\u003cg fill=\"${c}\" opacity=\"0.9\">\u003ccircle cx=\"312\" cy=\"104\" r=\"4\"/>\u003ccircle cx=\"208\" cy=\"208\" r=\"4\"/>\u003ccircle cx=\"364\" cy=\"260\" r=\"3\"/>\u003c/g>\u003c/svg>`;\n  }\n  if (kind === 'lines') {\n    return `\u003csvg class=\"motif\" viewBox=\"0 0 420 420\" fill=\"none\" aria-hidden=\"true\">\u003cg stroke=\"${c}\" stroke-width=\"0.9\" opacity=\"0.4\">`\n      + Array.from({length:14}, (_,i)=>`\u003cpath d=\"M${-40+i*34} 420 C ${60+i*30} 300, ${-20+i*30} 160, ${120+i*24} -20\"/>`).join('')\n      + `\u003c/g>\u003c/svg>`;\n  }\n  if (kind === 'utensils') {\n    // Fork + knife crossed over a plate ring — a cuisine-neutral \"dining\" mark for restaurants/food.\n    return `\u003csvg class=\"motif\" viewBox=\"0 0 420 420\" fill=\"none\" aria-hidden=\"true\">`\n      + `\u003cg stroke=\"${c}\" opacity=\"0.5\">\u003ccircle cx=\"300\" cy=\"150\" r=\"120\" stroke-width=\"1.2\"/>\u003ccircle cx=\"300\" cy=\"150\" r=\"150\" stroke-width=\"0.7\"/>\u003c/g>`\n      + `\u003cg stroke=\"${c}\" stroke-width=\"2.4\" stroke-linecap=\"round\" opacity=\"0.85\" transform=\"translate(300,150) rotate(32)\">`\n      + `\u003cline x1=\"-34\" y1=\"-78\" x2=\"-34\" y2=\"70\"/>\u003cline x1=\"-46\" y1=\"-78\" x2=\"-46\" y2=\"-30\"/>\u003cline x1=\"-58\" y1=\"-78\" x2=\"-58\" y2=\"-30\"/>\u003cpath d=\"M-58 -30 C -58 -14,-34 -14,-34 -30\"/>`\n      + `\u003cline x1=\"40\" y1=\"-6\" x2=\"40\" y2=\"70\"/>\u003cpath d=\"M40 -78 C 66 -78,66 -6,40 -6 C 22 -6,22 -78,40 -78 Z\"/>\u003c/g>\u003c/svg>`;\n  }\n  if (kind === 'pulse') {\n    // Heartbeat/pulse line — fitness / wellness / health.\n    return `\u003csvg class=\"motif\" viewBox=\"0 0 420 420\" fill=\"none\" aria-hidden=\"true\">\u003cg stroke=\"${c}\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\" opacity=\"0.7\">`\n      + Array.from({length:3}, (_,i)=>`\u003cpath d=\"M40 ${120+i*90} H150 l22 -52 26 104 20 -68 h130\" opacity=\"${0.85-i*0.25}\"/>`).join('')\n      + `\u003c/g>\u003c/svg>`;\n  }\n  if (kind === 'tags') {\n    // Scattered price-tag outlines (rounded corner + string hole) — retail / e-commerce.\n    const tag = (x,y,r,o)=>`\u003cg transform=\"translate(${x},${y}) rotate(${r})\" opacity=\"${o}\">\u003cpath d=\"M0 -34 L44 -34 A10 10 0 0 1 54 -24 L54 24 A10 10 0 0 1 44 34 L0 34 L-30 4 A6 6 0 0 1 -30 -4 Z\"/>\u003ccircle cx=\"38\" cy=\"0\" r=\"6\"/>\u003c/g>`;\n    return `\u003csvg class=\"motif\" viewBox=\"0 0 420 420\" fill=\"none\" aria-hidden=\"true\">\u003cg stroke=\"${c}\" stroke-width=\"2\" stroke-linejoin=\"round\">`\n      + tag(300,110,-18,0.85) + tag(360,220,26,0.6) + tag(250,240,8,0.7) + `\u003c/g>\u003c/svg>`;\n  }\n  if (kind === 'bloom') {\n    // Five-petal blossoms on a stem — beauty / salon / spa.\n    const flower = (x,y,s,o)=>`\u003cg transform=\"translate(${x},${y}) scale(${s})\" opacity=\"${o}\">`\n      + Array.from({length:5},(_,i)=>`\u003cellipse rx=\"9\" ry=\"20\" transform=\"rotate(${i*72})\"/>`).join('')\n      + `\u003ccircle r=\"5\" fill=\"${c}\" stroke=\"none\"/>\u003c/g>`;\n    return `\u003csvg class=\"motif\" viewBox=\"0 0 420 420\" fill=\"none\" aria-hidden=\"true\">\u003cg stroke=\"${c}\" stroke-width=\"1.6\" opacity=\"0.8\">`\n      + `\u003cpath d=\"M300 300 C 300 240,330 200,320 120\" stroke-width=\"1.4\" opacity=\"0.5\" fill=\"none\"/>`\n      + flower(320,110,1.1,0.9) + flower(360,190,0.8,0.6) + flower(268,208,0.9,0.7) + `\u003c/g>\u003c/svg>`;\n  }\n  if (kind === 'plus') {\n    // Rounded medical crosses — health / medical / dental.\n    const cross = (x,y,s,o)=>`\u003cg transform=\"translate(${x},${y}) scale(${s})\" opacity=\"${o}\">\u003cpath d=\"M-10 -26 h20 a4 4 0 0 1 4 4 v12 h12 a4 4 0 0 1 4 4 v20 a4 4 0 0 1 -4 4 h-12 v12 a4 4 0 0 1 -4 4 h-20 a4 4 0 0 1 -4 -4 v-12 h-12 a4 4 0 0 1 -4 -4 v-20 a4 4 0 0 1 4 -4 h12 v-12 a4 4 0 0 1 4 -4 Z\"/>\u003c/g>`;\n    return `\u003csvg class=\"motif\" viewBox=\"0 0 420 420\" fill=\"none\" aria-hidden=\"true\">\u003cg stroke=\"${c}\" stroke-width=\"2\" stroke-linejoin=\"round\">`\n      + cross(310,120,1.15,0.85) + cross(360,230,0.8,0.55) + cross(255,240,0.7,0.6) + `\u003c/g>\u003c/svg>`;\n  }\n  if (kind === 'roofline') {\n    // House / rooftop silhouettes — real estate / property / home services.\n    const house = (x,y,s,o)=>`\u003cg transform=\"translate(${x},${y}) scale(${s})\" opacity=\"${o}\">\u003cpath d=\"M-46 6 L0 -34 L46 6 M-34 6 V54 H34 V6 M-6 54 V26 H6 V54\"/>\u003c/g>`;\n    return `\u003csvg class=\"motif\" viewBox=\"0 0 420 420\" fill=\"none\" aria-hidden=\"true\">\u003cg stroke=\"${c}\" stroke-width=\"2\" stroke-linejoin=\"round\" stroke-linecap=\"round\">`\n      + house(300,120,1.15,0.85) + house(360,240,0.8,0.55) + house(238,232,0.7,0.6) + `\u003c/g>\u003c/svg>`;\n  }\n  // 'radar' default\n  return `\u003csvg class=\"motif\" viewBox=\"0 0 460 460\" fill=\"none\" aria-hidden=\"true\">\u003cg stroke=\"${c}\">`\n    + `\u003ccircle cx=\"230\" cy=\"230\" r=\"70\" stroke-width=\"1\"/>\u003ccircle cx=\"230\" cy=\"230\" r=\"130\" stroke-width=\"1\"/>`\n    + `\u003ccircle cx=\"230\" cy=\"230\" r=\"190\" stroke-width=\"1\"/>\u003ccircle cx=\"230\" cy=\"230\" r=\"250\" stroke-width=\"0.8\"/>`\n    + `\u003cline x1=\"230\" y1=\"0\" x2=\"230\" y2=\"460\" stroke-width=\"0.6\"/>\u003cline x1=\"0\" y1=\"230\" x2=\"460\" y2=\"230\" stroke-width=\"0.6\"/>\u003c/g>`\n    + `\u003cpath d=\"M230 230 L230 40 A190 190 0 0 1 390 320 Z\" fill=\"${c}\" fill-opacity=\"0.10\"/>\u003c/svg>`;\n}\n\n// ---- small helpers ---------------------------------------------------------\nconst esc = (s) => String(s == null ? '' : s)\n  .replace(/&/g,'&amp;').replace(/\u003c/g,'&lt;').replace(/>/g,'&gt;').replace(/\"/g,'&quot;');\nconst RATING = {\n  none:  { cls:'gap',   text:'None' },\n  partial:{ cls:'watch', text:'Partial' },\n  have:  { cls:'have',  text:'Have' },\n};\nconst cell = (r) => {\n  const m = RATING[(r||'').toLowerCase()] || RATING.partial;\n  return `\u003cspan class=\"cell ${m.cls}\">\u003cspan class=\"dot\">\u003c/span>${m.text}\u003c/span>`;\n};\n\n// ---- data with fallbacks ---------------------------------------------------\n// Name resolved in Aggregate Context (user-entered > AI-detected > domain slug); fall\n// back to Normalize only if Aggregate didn't run.\nconst companyLabel = esc(agg.companyLabel || norm.companyLabel || 'Your Company');\n// Subtitle is now two parts: a meta line (industry · location) from the profile, and a\n// tagline/motto from Gap Analysis' company_descriptor.\nconst metaBits = [agg.industry, agg.location].map(s => esc(s || '')).filter(Boolean);\nconst metaLine = metaBits.join(' &middot; ');\nconst companyDesc = esc(gap.company_descriptor || norm.companyUrl || '');\nconst summary = esc(gap.company_summary || 'Analysis summary unavailable.');\nconst positioning = esc(gap.positioning_angle || '');\nconst limitations = Array.isArray(gap.limitations) ? gap.limitations : [];\nconst recommendations = Array.isArray(gap.recommendations) ? gap.recommendations : [];\nconst matrix = gap.matrix || { columns: [], rows: [] };\nconst cols = matrix.columns || [];\nconst rows = matrix.rows || [];\nconst email = camp.email || {};\nconst paras = Array.isArray(email.body_paragraphs) ? email.body_paragraphs : [];\nconst hashtags = Array.isArray(camp.hashtags) ? camp.hashtags : [];\nconst today = new Date().toLocaleDateString('en-US',{month:'short',day:'numeric',year:'numeric'});\nconst len = (s)=> (s? String(s).length : 0);\n\n// ---- matrix html -----------------------------------------------------------\nconst matrixHead = `\u003ctr>\u003cth>Capability\u003c/th>\u003cth class=\"subject-col\">${companyLabel}\u003cspan class=\"col-tag\">you\u003c/span>\u003c/th>`\n  + cols.map(c=>`\u003cth>${esc(c.name||c)}\u003cspan class=\"col-tag\">${esc(c.url||'')}\u003c/span>\u003c/th>`).join('') + `\u003c/tr>`;\nconst matrixBody = rows.map(row => {\n  const compCells = (row.competitor_ratings||[]).map(r=>`\u003ctd>${cell(r)}\u003c/td>`).join('');\n  return `\u003ctr>\u003ctd class=\"cap\">${esc(row.capability||'')}\u003c/td>`\n    + `\u003ctd class=\"subject-col\">${cell(row.subject_rating)}\u003c/td>${compCells}\u003c/tr>`;\n}).join('');\n\n// ---- render ----------------------------------------------------------------\nconst v = T.vars;\nconst html = `\u003c!doctype html>\u003chtml>\u003chead>\u003cmeta charset=\"utf-8\">\u003cmeta name=\"viewport\" content=\"width=device-width,initial-scale=1\">\u003ctitle>Competitive Edge — ${companyLabel}\u003c/title>\n\u003cstyle>\n:root{--ink:${v.ink};--ink-soft:${v.inkSoft};--muted:${v.muted};--paper:${v.paper};--card:${v.card};--hairline:${v.hairline};--hairline-strong:${v.hairlineStrong};--brand:${brand};--brand-deep:${v.brandDeep};--gap:${v.gap};--gap-bg:${v.gapBg};--watch:${v.watch};--watch-bg:${v.watchBg};--have:${v.have};--have-bg:${v.haveBg};--fd:${T.fonts.display};--fb:${T.fonts.body};--fl:${T.fonts.label};--fm:'Consolas','Cascadia Mono',ui-monospace,monospace}\n*{box-sizing:border-box}\nbody{margin:0;background:var(--paper)}\n.doc{background:var(--paper);color:var(--ink);font-family:var(--fb);font-size:17px;line-height:1.62;-webkit-font-smoothing:antialiased}\n.wrap{max-width:940px;margin:0 auto;padding:0 24px 72px}\n.eyebrow{font-family:var(--fl);text-transform:uppercase;letter-spacing:.16em;font-size:12px;font-weight:700;color:var(--brand)}\nh2{font-family:var(--fd);font-weight:700;font-size:27px;letter-spacing:.005em;margin:0;color:var(--ink)}\nh3{font-family:var(--fd);font-weight:700;font-size:18px;margin:0;color:var(--ink)}\np{margin:0}\n.masthead{position:relative;overflow:hidden;background:${T.masthead};color:${T.mastheadText}}\n.masthead-inner{position:relative;z-index:2;max-width:940px;margin:0 auto;padding:40px 24px 34px}\n.motif{position:absolute;top:-80px;right:-70px;width:440px;height:440px;z-index:1;opacity:.5;pointer-events:none;fill:none}\n.kicker{font-family:var(--fl);text-transform:uppercase;letter-spacing:.28em;font-size:12px;font-weight:700;color:${T.kic cdiv class=\"wrap\">\n\u003csection>\u003cdiv class=\"sec-head\">\u003cspan class=\"eyebrow\">Executive Summary\u003c/span>\u003c/div>\n\u003cp class=\"lead\">${summary}\u003c/p>\n\u003cdiv class=\"tiles\">\n\u003cdiv class=\"tile\">\u003cdiv class=\"t-num accent\">${limitations.length}\u003c/div>\u003cdiv class=\"t-label\">Capability gaps vs. competitors\u003c/div>\u003c/div>\n\u003cdiv class=\"tile\">\u003cdiv class=\"t-num\">${competitors.length}\u003c/div>\u003cdiv class=\"t-label\">Direct competitors analyzed\u003c/div>\u003c/div>\n\u003cdiv class=\"tile\">\u003cdiv class=\"t-num\">${recommendations.length}\u003c/div>\u003cdiv class=\"t-label\">Prioritized moves recommended\u003c/div>\u003c/div>\n\u003cdiv class=\"tile\">\u003cdiv class=\"t-num\">4\u003c/div>\u003cdiv class=\"t-label\">Campaign assets drafted\u003c/div>\u003c/div>\n${positioning?`\u003cdiv class=\"tile wide\">\u003cdiv class=\"t-label\" style=\"margin-top:0;margin-bottom:6px\">Recommended positioning\u003c/div>\u003cdiv class=\"t-num\">&ldquo;${positioning}&rdquo;\u003c/div>\u003c/div>`:''}\n\u003c/div>\u003c/section>\n\u003csection>\u003cdiv class=\"sec-head\">\u003cspan class=\"idx\">01\u003c/span>\u003ch2>Competitive Gap Analysis\u003c/h2>\u003cspan class=\"sub\">${companyLabel} vs. discovered competitors\u003c/span>\u003c/div>\n\u003cdiv class=\"matrix-scroll\">\u003ctable class=\"matrix\">\u003cthead>${matrixHead}\u003c/thead>\u003ctbody>${matrixBody}\u003c/tbody>\u003c/table>\u003c/div>\n\u003cdiv class=\"legend\">\u003cspan>\u003cspan class=\"dot\" style=\"background:var(--gap)\">\u003c/span>None &mdash; not offered\u003c/span>\u003cspan>\u003cspan class=\"dot\" style=\"background:var(--watch)\">\u003c/span>Partial &mdash; underbuilt\u003c/span>\u003cspan>\u003cspan class=\"dot\" style=\"background:var(--have)\">\u003c/span>Have &mdash; established\u003c/span>\u003c/div>\u003c/section>\n\u003csection>\u003cdiv class=\"sec-head\">\u003cspan class=\"idx\">02\u003c/span>\u003ch2>Limitations 03c/div>\u003cp class=\"s-text\">${esc(camp.x_post||'')}\u003c/p>\u003c/div>\n\u003cdiv class=\"social\">\u003cdiv class=\"s-head\">\u003cspan class=\"s-plat\">Instagram\u003c/span>\u003cspan class=\"s-count\">${len(camp.instagram_caption)} chars\u003c/span>\u003c/div>\u003cp class=\"s-text\">${esc(camp.instagram_caption||'')}\u003c/p>\n${hashtags.length?`\u003cdiv class=\"tags\">${hashtags.map(h=>`\u003cspan class=\"tag\">${esc(h.startsWith&&h.startsWith('#')?h:'#'+h)}\u003c/span>`).join('')}\u003c/div>`:''}\u003c/div>\n\u003c/div>\u003c/section>\n\u003cfooter class=\"foot\">\n\u003cdiv class=\"brandline\">Competitive Edge Campaign Builder &middot; automated market recon\u003c/div>\n\u003cdiv>Generated from public web sources only &mdash; the company's own site plus \u003ccode>${competitors.length}\u003c/code> auto-discovered competitor sites. Competitor capability ratings are inferred from public pages and may need a human sanity-check.\u003c/div>\n\u003cdiv>All campaign copy above is a \u003cb>draft for human review\u003c/b>. Nothing is posted to social media or sent to any customer automatically.\u003c/div>\n\u003cdiv style=\"font-family:var(--fl);color:var(--brand-deep)\">Theme applied: \u003cb>${esc(T.label)}\u003c/b>${theme.industry?` &mdash; auto-selected for the ${esc(theme.industry)} industry`:''}.\u003c/div>\n\u003c/footer>\u003c/div>\u003c/div>\u003c/body>\u003c/html>`;\n\n// ---- email-safe summary (the email BODY; the full report goes out as a PDF) ----\n// Gmail strips flexbox/grid, so this uses only inline styles + block elements.\nconst topGaps = limitations.slice(0, 3);\nconst summaryHtml = `\u003cdiv style=\"font-family:Arial,Helvetica,sans-serif;color:#222222;font-size:15px;line-height:1.6;max-width:600px;\">\n\u003cp style=\"font-size:12px;letter-spacing:1.5px;text-transform:uppercase;color:#8a8a8a;margin:0 0 4px;\">Competitive Edge &middot; Market Recon\u003c/p>\n\u003ch2 style=\"font-size:22px;margin:0 0 12px;color:#111111;\">${companyLabel}\u003c/h2>\n\u003cp style=\"margin:0 0 18px;\">${summary}\u003c/p>\n\u003cp style=\"font-weight:bold;margin:0 0 6px;color:#111111;\">Top gaps vs. competitors\u003c/p>\n\u003cul style=\"margin:0 0 18px;padding-left:20px;\">\n${(topGaps.length ? topGaps : [{title:'See attached report',detail:''}]).map(l=>`\u003cli style=\"margin-bottom:7px;\">\u003cb>${esc(l.title||'')}.\u003c/b> ${esc(l.detail||'')}\u003c/li>`).join('')}\n\u003c/ul>\n${recommendations.length ? `\u003cp style=\"font-weight:bold;margin:0 0 6px;color:#111111;\">Top move\u003c/p>\n\u003cp style=\"margin:0 0 18px;\">&rarr; \u003cb>${esc(recommendations[0].title||'')}.\u003c/b> ${esc(recommendations[0].detail||'')}\u003c/p>` : ''}\n${positioning ? `\u003cp style=\"margin:0 0 18px;padding:12px 16px;background:#f4f4f4;border-left:3px solid #9a9a9a;font-style:italic;\">&ldquo;${positioning}&rdquo;\u003c/p>` : ''}\n\u003cp style=\"margin:0 0 18px;\">\u003cb>${competitors.length}\u003c/b> competitor${competitors.length===1?'':'s'} analyzed via web search. The full designed report &mdash; gap matrix, recommendations, and a ready-to-post campaign (email + LinkedIn + X + Instagram) &mdash; is attached as a \u003cb>PDF\u003c/b>.\u003c/p>\n\u003cp style=\"font-size:12px;color:#9a9a9a;margin:18px 0 0;\">All campaign copy is a draft for review. Nothing is auto-posted or sent to customers.\u003c/p>\n\u003c/div>`;\n\n// Friendly attachment name from the clean company name, falling back to the host.\nconst slug = String(agg.companyLabel || norm.companyHost || 'report')\n  .toLowerCase().replace(/[^a-z0-9]+/gi, '-').replace(/^-|-$/g, '') || 'report';\nconst pdfFilename = `competitive-edge-${slug}.pdf`;\n\nreturn [{\n  json: {\n    to: norm.notifyEmail,\n    subject: `Competitive Edge Report + Campaign — ${agg.companyLabel || norm.companyLabel || 'your company'}`,\n    reportHtml: html,   // full designed report → rendered to PDF by the next node\n    summaryHtml,        // email body (Gmail-safe)\n    pdfFilename,\n    themeApplied: T.label,\n  },\n}];\n"}},{"name":"Render PDF","type":"n8n-nodes-base.httpRequest","typeVersion":4.2,"position":[3360,300],"parameters":{"method":"POST","url":"https://api.pdfshift.io/v3/convert/pdf","authentication":"genericCredentialType","genericAuthType":"httpHeaderAuth","sendBody":true,"specifyBody":"json","jsonBody":"={{ JSON.stringify({ source: $json.reportHtml, use_print: true, landscape: false }) }}","options":{"timeout":60000,"response":{"response":{"responseFormat":"file","outputPropertyName":"data"}}}},"retryOnFail":true,"maxTries":2,"waitBetweenTries":2000},{"name":"Name PDF","type":"n8n-nodes-base.code","typeVersion":2,"position":[3600,300],"parameters":{"mode":"runOnceForAllItems","jsCode":"// Name PDF — n8n Code node (Run Once for All Items)\n// Gives the PDF binary a friendly filename + correct mime so Gmail attaches it\n// as \"competitive-edge-\u003ccompany>.pdf\" instead of a generic name.\nconst item = $input.first();\nconst fname = $('Assemble Report').first().json.pdfFilename || 'competitive-edge-report.pdf';\n\nif (item.binary && item.binary.data) {\n  item.binary.data.fileName = fname;\n  item.binary.data.fileExtension = 'pdf';\n  item.binary.data.mimeType = 'application/pdf';\n}\n\nreturn [item];\n"}},{"name":"Email Report","type":"n8n-nodes-base.gmail","typeVersion":2.2,"position":[3840,300],"parameters":{"resource":"message","operation":"send","sendTo":"={{ $('Assemble Report').item.json.to }}","subject":"={{ $('Assemble Report').item.json.subject }}","emailType":"html","message":"={{ $('Assemble Report').item.json.summaryHtml }}","options":{"appendAttribution":false,"attachmentsUi":{"attachmentsBinary":[{"property":"data"}]}}}},{"name":"Gemini","type":"@n8n/n8n-nodes-langchain.lmChatGoogleGemini","typeVersion":1.1,"position":[1320,560],"parameters":{"modelName":"models/gemini-2.5-flash","options":{"maxOutputTokens":8192,"temperature":0.4}}},{"name":"Profile Schema","type":"@n8n/n8n-nodes-langchain.outputParserStructured","typeVe n  \"positioning_angle\": \"Most coffee says single origin; you show them the farm and deliver it to their door.\",\n  \"theme\": {\n    \"industry\": \"specialty coffee\",\n    \"preset_key\": \"cozy_warm\",\n    \"accent_hex\": \"#a5673f\",\n    \"motif_key\": \"beans\",\n    \"rationale\": \"warm, craft, hospitality feel\"\n  }\n}\n","autoFix":true}},{"name":"Campaign Schema","type":"@n8n/n8n-nodes-langchain.outputParserStructured","typeVersion":1.3,"position":[2880,520],"parameters":{"schemaType":"fromJson","jsonSchemaExample":"{\n  \"email\": {\n    \"subject\": \"The Asheville roaster that shows you the farm\",\n    \"body_paragraphs\": [\n      \"Hi there,\",\n      \"Most coffee brands say \\\"single origin.\\\" We can show you the exact farm, the elevation, and the grower.\",\n      \"Starting this month our rotating single-origin beans ship to you every two weeks, each box with a card on the farm behind it.\",\n      \"Start your subscription today.\",\n      \"Same beans your neighbors line up for, now on your counter.\",\n      \"— The Meridian team\"\n    ]\n  },\n  \"linkedin\": \"We have always believed you should know where your coffee comes from, not as a slogan but as a farm and a grower you can name. This month that transparency leaves the cafe: single-origin subscriptions ship every two weeks with the story of the farm inside every box.\",\n  \"x_post\": \"Most \\\"single origin\\\" coffee won't tell you the farm. Ours will, on a card in every box. Subscriptions ship every 2 weeks. Meet the farm behind your morning.\",\n  \"instagram_caption\": \"You already know our pour-over. Now meet the farm behind it. Single-origin subscriptions start this month, delivered every two weeks, each with the story of where it grew. Link in bio.\",\n  \"hashtags\": [\"SpecialtyCoffee\", \"SingleOrigin\", \"AshevilleCoffee\", \"CoffeeSubscription\", \"KnowYourFarmer\"]\n}\n","autoFix":true}}],"connections":{"Campaign Request Form":{"main":[[{"node":"Normalize Input
