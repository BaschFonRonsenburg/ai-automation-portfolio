<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 420" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="mk" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6d00cc"/>
      <stop offset="1" stop-color="#c400ff"/>
    </linearGradient>
  </defs>

  <!-- page -->
  <rect width="920" height="420" rx="10" fill="#f4f1fb"/>

  <!-- window bar -->
  <rect x="0" y="0" width="920" height="40" rx="10" fill="#e7e0f4"/>
  <rect x="0" y="20" width="920" height="20" fill="#e7e0f4"/>
  <circle cx="24" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="20" r="6" fill="#febc2e"/>
  <circle cx="64" cy="20" r="6" fill="#28c840"/>
  <text x="460" y="25" text-anchor="middle" font-size="12" fill="#7a6b93">Make.com — Lead Enrichment &amp; Routing</text>

  <text x="40" y="72" font-size="17" font-weight="800" fill="#3a1c66">Lead Enrichment &amp; Routing</text>
  <text x="40" y="92" font-size="12.5" fill="#7a6b93">Form → AI qualify (Gemini) → log every lead → route Hot / Warm / Cold</text>

  <!-- connector line -->
  <line x1="120" y1="200" x2="800" y2="200" stroke="#c9b8e6" stroke-width="2"/>
  <line x1="640" y1="200" x2="720" y2="130" stroke="#c9b8e6" stroke-width="2"/>
  <line x1="640" y1="200" x2="720" y2="270" stroke="#c9b8e6" stroke-width="2"/>

  <!-- module bubble helper: circles with labels -->
  <!-- 1 webhook -->
  <circle cx="120" cy="200" r="34" fill="url(#mk)"/>
  <text x="120" y="205" text-anchor="middle" font-size="22" fill="#ffffff">⚡</text>
  <text x="120" y="258" text-anchor="middle" font-size="11.5" font-weight="600" fill="#3a1c66">Webhook</text>
  <text x="120" y="273" text-anchor="middle" font-size="10.5" fill="#7a6b93">Form intake</text>

  <!-- 2 gemini -->
  <circle cx="290" cy="200" r="34" fill="#1a73e8"/>
  <text x="290" y="205" text-anchor="middle" font-size="20" fill="#ffffff">✦</text>
  <text x="290" y="258" text-anchor="middle" font-size="11.5" font-weight="600" fill="#3a1c66">Gemini</text>
  <text x="290" y="273" text-anchor="middle" font-size="10.5" fill="#7a6b93">Qualify + score</text>

  <!-- 3 parse -->
  <circle cx="460" cy="200" r="34" fill="#8a7563"/>
  <text x="460" y="206" text-anchor="middle" font-size="18" fill="#ffffff">{ }</text>
  <text x="460" y="258" text-anchor="middle" font-size="11.5" font-weight="600" fill="#3a1c66">Parse JSON</text>
  <text x="460" y="273" text-anchor="middle" font-size="10.5" fill="#7a6b93">tier · score</text>

  <!-- 4 sheets -->
  <circle cx="640" cy="200" r="34" fill="#0f9d58"/>
  <text x="640" y="206" text-anchor="middle" font-size="18" fill="#ffffff">▤</text>
  <text x="640" y="258" text-anchor="middle" font-size="11.5" font-weight="600" fill="#3a1c66">Sheets</text>
  <text x="640" y="273" text-anchor="middle" font-size="10.5" fill="#7a6b93">log every lead</text>

  <!-- router split: slack (hot) and email (warm) -->
  <!-- slack -->
  <circle cx="750" cy="120" r="30" fill="#4a154b"/>
  <text x="750" y="126" text-anchor="middle" font-size="16" fill="#ffffff">#</text>
  <rect x="792" y="106" width="108" height="30" rx="15" fill="#fde8e6"/>
  <text x="846" y="125" text-anchor="middle" font-size="11" font-weight="700" fill="#b23a2e">🔥 Hot → Slack</text>

  <!-- email -->
  <circle cx="750" cy="280" r="30" fill="#d97706"/>
  <text x="750" y="286" text-anchor="middle" font-size="16" fill="#ffffff">✉</text>
  <rect x="792" y="266" width="120" height="30" rx="15" fill="#fef3c7"/>
  <text x="852" y="285" text-anchor="middle" font-size="11" font-weight="700" fill="#7a5710">Warm → Auto-reply</text>

  <!-- cold note -->
  <text x="640" y="330" text-anchor="middle" font-size="10.5" fill="#9a8fb0">Cold → logged only</text>

  <!-- footer chips -->
  <g font-size="11" font-family="Segoe UI, sans-serif">
    <rect x="40" y="372" width="118" height="24" rx="12" fill="#ede7f8"/><text x="99" y="388" text-anchor="middle" fill="#5b3a91">Make.com scenario</text>
    <rect x="166" y="372" width="150" height="24" rx="12" fill="#ede7f8"/><text x="241" y="388" text-anchor="middle" fill="#5b3a91">Gemini free tier · no scraping</text>
    <rect x="324" y="372" width="160" height="24" rx="12" fill="#ede7f8"/><text x="404" y="388" text-anchor="middle" fill="#5b3a91">Importable blueprint.json</text>
  </g>
</svg>
