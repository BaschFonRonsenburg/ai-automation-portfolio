<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 650" font-family="Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <!-- page -->
  <rect width="640" height="650" rx="10" fill="#f1f1ef"/>

  <!-- window bar -->
  <rect x="0" y="0" width="640" height="40" rx="10" fill="#e6e6e3"/>
  <rect x="0" y="20" width="640" height="20" fill="#e6e6e3"/>
  <circle cx="24" cy="20" r="6" fill="#ff5f57"/>
  <circle cx="44" cy="20" r="6" fill="#febc2e"/>
  <circle cx="64" cy="20" r="6" fill="#28c840"/>
  <text x="320" y="25" text-anchor="middle" font-size="12" fill="#8a8a86">Zapier — Content Repurposer</text>

  <text x="40" y="72" font-size="17" font-weight="800" fill="#201515">Content Repurposer</text>
  <text x="40" y="92" font-size="12.5" fill="#6b6b67">New post → AI writes LinkedIn + X thread + newsletter → 3 Google Docs drafts → log + Slack</text>

  <!-- vertical connector -->
  <line x1="80" y1="150" x2="80" y2="560" stroke="#d3d3cf" stroke-width="2"/>

  <!-- 1 RSS trigger -->
  <circle cx="80" cy="150" r="22" fill="#ee7000"/>
  <text x="80" y="156" text-anchor="middle" font-size="18" fill="#ffffff">»</text>
  <rect x="120" y="122" width="480" height="56" rx="10" fill="#ffffff" stroke="#e2e2de"/>
  <text x="138" y="144" font-size="11" font-weight="700" letter-spacing="1" fill="#ff4f00">TRIGGER · RSS BY ZAPIER</text>
  <text x="138" y="166" font-size="13.5" font-weight="600" fill="#201515">New Item in Feed  —  your blog / newsletter</text>

  <!-- 2 Gemini repurpose -->
  <circle cx="80" cy="250" r="22" fill="#1a73e8"/>
  <text x="80" y="256" text-anchor="middle" font-size="15" fill="#ffffff">✦</text>
  <rect x="120" y="222" width="480" height="56" rx="10" fill="#ffffff" stroke="#e2e2de"/>
  <text x="138" y="244" font-size="11" font-weight="700" letter-spacing="1" fill="#ff4f00">ACTION · WEBHOOKS → GEMINI</text>
  <text x="138" y="266" font-size="13.5" font-weight="600" fill="#201515">Repurpose post  →  { linkedin, x_thread, newsletter }</text>

  <!-- 3 Google Docs fan-out (x3) -->
  <circle cx="80" cy="360" r="22" fill="#4285f4"/>
  <text x="80" y="366" text-anchor="middle" font-size="15" fill="#ffffff">≣</text>
  <rect x="120" y="322" width="480" height="76" rx="10" fill="#ffffff" stroke="#e2e2de"/>
  <text x="138" y="344" font-size="11" font-weight="700" letter-spacing="1" fill="#4285f4">ACTION · GOOGLE DOCS  ·  ×3 fan-out</text>
  <g font-size="11.5" font-weight="600">
    <rect x="138" y="358" width="84" height="24" rx="12" fill="#eaf1fe"/><text x="180" y="374" text-anchor="middle" fill="#1a56c4">LinkedIn</text>
    <rect x="230" y="358" width="84" height="24" rx="12" fill="#eaf1fe"/><text x="272" y="374" text-anchor="middle" fill="#1a56c4">X thread</text>
    <rect x="322" y="358" width="98" height="24" rx="12" fill="#eaf1fe"/><text x="371" y="374" text-anchor="middle" fill="#1a56c4">Newsletter</text>
  </g>
  <text x="432" y="374" font-size="11.5" fill="#6b6b67">draft docs you review</text>

  <!-- 4 log sheet -->
  <circle cx="80" cy="470" r="22" fill="#0f9d58"/>
  <text x="80" y="476" text-anchor="middle" font-size="15" fill="#ffffff">▤</text>
  <rect x="120" y="442" width="480" height="56" rx="10" fill="#ffffff" stroke="#e2e2de"/>
  <text x="138" y="464" font-size="11" font-weight="700" letter-spacing="1" fill="#0f9d58">ACTION · GOOGLE SHEETS</text>
  <text x="138" y="486" font-size="13.5" font-weight="600" fill="#201515">Create Row  —  date, source_title, link, status</text>

  <!-- 5 slack -->
  <circle cx="80" cy="560" r="20" fill="#4a154b"/>
  <text x="80" y="566" text-anchor="middle" font-size="14" fill="#ffffff">#</text>
  <rect x="120" y="536" width="480" height="48" rx="10" fill="#f6f2fb" stroke="#e6dcef"/>
  <text x="138" y="556" font-size="11" font-weight="700" letter-spacing="1" fill="#4a154b">ACTION · SLACK</text>
  <text x="138" y="574" font-size="12.5" fill="#4a154b">Ping #content — “3 drafts ready for {{title}}”</text>

  <!-- footer chips -->
  <g font-size="11">
    <rect x="40" y="604" width="150" height="24" rx="12" fill="#ffece2"/><text x="115" y="620" text-anchor="middle" fill="#c23e00">Zapier · multi-step fan-out</text>
    <rect x="198" y="604" width="150" height="24" rx="12" fill="#ffece2"/><text x="273" y="620" text-anchor="middle" fill="#c23e00">Human-in-the-loop drafts</text>
  </g>
</svg>
